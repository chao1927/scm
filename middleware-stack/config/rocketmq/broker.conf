brokerClusterName=DefaultCluster
brokerName=broker-a
brokerId=0

# Mac/本机开发：NameServer 返回 127.0.0.1，宿主机应用可通过 localhost:10911 访问。
# 如果应用也在 Docker 网络里，把这里改成 scm-rocketmq-broker 或容器可达 IP。
brokerIP1=127.0.0.1
listenPort=10911

namesrvAddr=rocketmq-namesrv:9876

# 开发环境方便使用；生产环境建议关闭，改成显式创建 Topic / Group。
autoCreateTopicEnable=true
autoCreateSubscriptionGroup=true

# 单机资源有限配置
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH
sendMessageThreadPoolNums=8
pullMessageThreadPoolNums=8

# 存储路径
storePathRootDir=/home/rocketmq/store
storePathCommitLog=/home/rocketmq/store/commitlog
storePathConsumeQueue=/home/rocketmq/store/consumequeue
storePathIndex=/home/rocketmq/store/index
storeCheckpoint=/home/rocketmq/store/checkpoint
abortFile=/home/rocketmq/store/abort

# 磁盘保留
deleteWhen=04
fileReservedTime=48
diskMaxUsedSpaceRatio=85

# 文件大小
mapedFileSizeCommitLog=1073741824
mapedFileSizeConsumeQueue=300000

# 超时/保护
brokerPermission=6
waitTimeMillsInSendQueue=200
