<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-168 -309.25 1223.9099999999999 614.5" width="1223.9099999999999" height="614.5"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-168" y="-309.25" width="1223.9099999999999" height="614.5" fill="#fff"/>
<rect x="-84" y="-18" width="168" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">接口文档主要内容</text><path d="M84,0 C174,0 174,-140 264,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-155" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">接入指南</text><path d="M260,-140 C310,-140 310,-180 360,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-195" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="496.5" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">外部开发者怎么对接，怎么阅读相关的文档</text><path d="M260,-140 C310,-140 310,-140 360,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-155" width="345.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="532.64" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">研发人员输出技术方面的说明，环境，URL，账号信息等</text><path d="M260,-140 C310,-140 310,-100 360,-100" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-115" width="442" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="581" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品经理输出一些流程图，说明类的内容，并把研发输出的东西一起整合</text><path d="M84,0 C174,0 174,-40 264,-40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-55" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="225.5" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">开发者必读</text><path d="M271,-40 C315.5,-40 315.5,-60 360,-60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-75" width="455" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="587.5" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">写给开发者的一些介绍说明文档，一般来说可以让技术输出，产品帮忙润色</text><path d="M271,-40 C315.5,-40 315.5,-20 360,-20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-35" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="477" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">应用环境说明、生成签名、更新日志</text><path d="M84,0 C174,0 174,60 264,60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="45" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">接口文档</text><path d="M260,60 C310,60 310,20 360,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="5" width="468.9099999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="594.4549999999999" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一份接口文档中，会有多个接口（API EndPoint），不同的接口需要分别处理</text><path d="M260,60 C310,60 310,60 360,60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="45" width="611.9099999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="665.9549999999999" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品经理主要负责定义有多少个接口（API EndPoint），然后每个接口中的一些应用参数，字段说明等</text><path d="M260,60 C310,60 310,100 360,100" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="85" width="611" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="665.5" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">研发人员主要输出一些请求示例，响应示例，系统参数等，同时也可以和产品经理协作，互相走查复核</text><path d="M84,0 C174,0 174,160 264,160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="145" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">错误码</text><path d="M260,160 C310,160 310,140 360,140" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="125" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="464" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一般是给开发者去定位问题使用</text><path d="M260,160 C310,160 310,180 360,180" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="165" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="438" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">研发人员负责输出即可</text>
</svg>