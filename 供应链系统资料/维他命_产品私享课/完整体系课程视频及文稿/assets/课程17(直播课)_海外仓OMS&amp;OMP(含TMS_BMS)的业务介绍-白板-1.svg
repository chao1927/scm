<rect x="-148.48000000000002" y="-519" width="1208.76" height="1038" fill="#fff"/>
<rect x="-64.48" y="-18" width="128.96" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">OMS功能模块</text><path d="M64.48,0 C154.48000000000002,0 154.48000000000002,-160 244.48000000000002,-160" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-175" width="98.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="229.14" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">国内电商OMS</text><path d="M278.28,-160 C319.14,-160 319.14,-420 360,-420" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-435" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-415" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品管理</text><path d="M440,-420 C490,-420 490,-420 540,-420" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-435" width="397.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="738.64" y="-415" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">和海外仓OMS中的产品管理是一样的意思，是供应了系统中的基石</text><path d="M278.28,-160 C319.14,-160 319.14,-360 360,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-375" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">订单管理</text><path d="M440,-360 C490,-360 490,-380 540,-380" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-395" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="676.5" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">是核心中的核心，涉及到很多订单处理逻辑</text><path d="M440,-360 C490,-360 490,-340 540,-340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-355" width="305.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="692.88" y="-335" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">拆/合单，赠品处理，订单审核，分仓，分物流等</text><path d="M278.28,-160 C319.14,-160 319.14,-260 360,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-275" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">库存中心</text><path d="M440,-260 C490,-260 490,-300 540,-300" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-315" width="364" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="722" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">也有人称之为中央库存系统（模块），或者是库存调度模块</text><path d="M440,-260 C490,-260 490,-260 540,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-275" width="423.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="751.64" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">由于国内多渠道，多业务形态的电商模式，所以OMS的库存中心很重要</text><path d="M440,-260 C490,-260 490,-220 540,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-235" width="299" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="689.5" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">涉及到库存的分配，库存的同步，库存的调度等</text><path d="M278.28,-160 C319.14,-160 319.14,-160 360,-160" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-175" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">财务中心</text><path d="M440,-160 C490,-160 490,-180 540,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-195" width="364" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="722" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">也有人称之为结算中心，涉及到订单的结算，发票，对账等</text><path d="M440,-160 C490,-160 490,-140 540,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-155" width="267.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="673.64" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">国内电商OMS中财务模块也比较重要和核心</text><path d="M278.28,-160 C319.14,-160 319.14,0 360,0" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-15" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="412" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他功能模块</text><path d="M464,0 C502,0 502,-80 540,-80" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-95" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">会员模块</text><path d="M620,-80 C670,-80 670,-100 720,-100" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-115" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">会员权益</text><path d="M620,-80 C670,-80 670,-60 720,-60" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-75" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">会员管理</text><path d="M464,0 C502,0 502,0 540,0" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-15" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">营销中心</text><path d="M620,0 C670,0 670,-20 720,-20" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-35" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="772" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">营销活动管理</text><path d="M620,0 C670,0 670,20 720,20" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="5" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="772" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">营销效果分析</text><path d="M464,0 C502,0 502,60 540,60" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="45" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">系统设置</text><path d="M464,0 C502,0 502,100 540,100" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="85" width="97.75999999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="588.88" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">账号&amp;权限等</text><path d="M64.48,0 C154.48000000000002,0 154.48000000000002,280 244.48000000000002,280" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="265" width="85.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="222.64" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">海外仓OMS</text><path d="M265.28,280 C312.64,280 312.64,140 360,140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="125" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品管理</text><path d="M440,140 C490,140 490,140 540,140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="125" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="644" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品资料是供应链系统中的基石</text><path d="M265.28,280 C312.64,280 312.64,180 360,180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="165" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">订单管理</text><path d="M440,180 C490,180 490,180 540,180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="165" width="436.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="758.14" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">来自电商平台的订单，可能是导入的，ERP推送的或者从电商平台拉取的</text><path d="M265.28,280 C312.64,280 312.64,220 360,220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="205" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">出入库管理</text><path d="M451,220 C495.5,220 495.5,220 540,220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="205" width="410.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="745.14" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">和WMS关联的模块，可以推送入库单，出库单，退货单等给仓库作业</text><path d="M265.28,280 C312.64,280 312.64,260 360,260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="245" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">库存管理</text><path d="M440,260 C490,260 490,260 540,260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="245" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="715.5" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">查看具体的产品的库存情况，及时的补货或者做出预处理</text><path d="M265.28,280 C312.64,280 312.64,360 360,360" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="345" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="418.5" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他的功能模块</text><path d="M477,360 C508.5,360 508.5,300 540,300" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="285" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">系统设置</text><path d="M477,360 C508.5,360 508.5,340 540,340" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="325" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">费用管理</text><path d="M477,360 C508.5,360 508.5,380 540,380" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="365" width="84.75999999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="582.38" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">账号&amp;权限</text><path d="M477,360 C508.5,360 508.5,420 540,420" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="405" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="425" text-anchor="middle" 