<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-192 -499 2867.66 998" width="2867.66" height="998"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-192" y="-499" width="2867.66" height="998" fill="#fff"/>
<rect x="-108" y="-18" width="216" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购管理的核心业务场景</text><path d="M108,0 C198,0 198,-360 288,-360" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-375" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">以销定购</text><path d="M260,-360 C310,-360 310,-400 360,-400" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-415" width="676" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="698" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">以销定购是一种商业策略，它指的是企业根据销售情况来决定采购量或生产量，以此来减少库存积压和降低成本。</text><path d="M260,-360 C310,-360 310,-360 360,-360" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-375" width="1391.3899999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1055.695" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购员A通过查询销售订单编号或者商品，发现客户001下了一笔100台笔记本的电脑订单，决定生成采购订单进行采购。 通过查询出来的销售订单，可以看到客户的预定量，然后决定本次采购数量制定采购计划，点击“生成采购订单”即可。</text><path d="M260,-360 C310,-360 310,-320 360,-320" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-335" width="169.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="444.76" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">销售订单-&gt;生成采购订单</text><path d="M108,0 C198,0 198,-260 288,-260" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-275" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">批次管理的商品入库</text><path d="M323,-260 C341.5,-260 341.5,-280 360,-280" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-295" width="1170" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="945" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一些带有保质期的商品需要进行效期管理，而效期管理其实是批次管理的一种经典案例。相同生产日期的商品可以认为是一个批次，只要选择对应的批次号就可以带出它的生产日期，保质期和失效日期</text><path d="M323,-260 C341.5,-260 341.5,-240 360,-240" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-255" width="2078.31" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1399.155" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购员A要采购一批牛奶，并且要记录商品的批次和保质期，批次和保质期在入库的时候要手动录入。生产日期可以选择，保质期天数是根据商品信息中设置的天数带出来的，到期日是根据生产日期和保质期天数自动算出来的， 无需手工录入。如果入库时，保质期不等于商品资料中的天数，也可以手动录入生产日期和到期日，系统会自动反算出保质期天数。</text><path d="M108,0 C198,0 198,-160 288,-160" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-175" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="238.5" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">序列号商品入库</text><path d="M297,-160 C328.5,-160 328.5,-180 360,-180" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-195" width="897" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="808.5" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品的序列号管理是一种用于追踪和识别单个商品的系统。每个商品都有一个独特的序列号，这个序列号通常由字母和数字组成，用于区分不同的产品。</text><path d="M1257,-180 C898.5,-180 898.5,-200 540,-200" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-215" width="219.05" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="649.525" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">同一个SKU：iPhone 15 白色 128G</text><path d="M1257,-180 C898.5,-180 898.5,-160 540,-160" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-175" width="390" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="735" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">每一台手机都会有独一无二的序列号，所以这个也称之为唯一码</text><path d="M297,-160 C328.5,-160 328.5,-120 360,-120" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-135" width="1956.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1338.38" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购员A要采购一批手机，需要录手手机的序列号，便于售后跟踪，需要记录出库的每台手机的序列号。序列号商品入库，录入的序列号个数，与入库数量必须一致；序列号录入有多种方式：手工录入序列号，从仓库中选择已有的序列号，自动生成序列号，也可以从其他文档复制粘贴而来；一个商品相同的序列号，在仓库中只能有一个。</text><path d="M108,0 C198,0 198,-20 288,-20" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="-35" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">辅助属性商品入库</text><path d="M310,-20 C335,-20 335,-40 360,-40" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-55" width="1183" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="951.5" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品的辅助属性是指除了商品的基本属性（如名称、型号、规格、价格等）之外，用于进一步描述商品特征的附加信息。这些属性的不一样，会导致商品在库存管理，采购、销售管理方面也需要做出改变</text><path d="M1543,-40 C1041.5,-40 1041.5,-80 540,-80" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-95" width="260.91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="670.455" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">iPhone 15是SPU，也可以理解为一款商品</text><path d="M1543,-40 C1041.5,-40 1041.5,-40 540,-40" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-55" width="182" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="631" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">颜色，内存，版本都是属性</text><path d="M1543,-40 C1041.5,-40 1041.5,0 540,0" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-15" width="471.1199999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="775.56" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">白色、黑色、蓝色、128G、256G、512G、国行、港版、美版都是具体的属性值</text><path d="M310,-20 C335,-20 335,40 360,40" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="25" width="1162.07" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="941.035" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购员A要采购一批帽子，入库的时候需要录入帽子的颜色和尺码方便区分。 商品的颜色和尺码要提前在资料-辅助属性添加好，然后在添加商品信息的时候启用，最后在采购单上选择相应属性即可。</text><path d="M108,0 C198,0 198,120 288,120" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="105" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="258" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">多张采购订单合并入库</text><path d="M336,120 C348,120 348,80 360,80" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="65" width="1663.87" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1191.935" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购员A发现目前笔记本销售高峰期，于是又从供应商001追加一笔5台笔记本订单，两张订单要合并一起入库。合并入库的时候要先选中单据，然后点击“合并入库”即可； 注：如果是同一家供应商则合并入库会生成一张单据，如果不是同一个供应商则根据供应商不同生成多张不同单据。</text><path d="M336,120 C348,120 348,140 360,140" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="125" width="1443" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1081.5" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">在进销存的场景下，采购订单可以合并下推生成采购入库单，这样供应商送货的时候可以一起送货，仓库收货的时候也可以一起操作；但是一般在实际的采购送货到仓库的业务中，供应商可以一起送货，但是不同采购订单的实物还是要区分标记一下</text><path d="M1803,140 C1171.5,140 1171.5,120 540,120" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="105" width="429" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="754.5" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">实物要区分属于什么采购订单，仓库收货之后，回传数量可能会有差异</text><path d="M1803,140 C1171.5,140 1171.5,160 540,160" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="145" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="715.5" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这样可以知道到底哪个采购订单有差异，哪个是没问题的</text><path d="M108,0 C198,0 198,240 288,240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购退货</text><path d="M260,240 C310,240 310,240 360,240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M440,240 C490,240 490,220 540,220" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="205" width="741" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="910.5" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">金蝶的采购退货是基于采购入库单发起的，也就是采购入库单审核了，意味着商品入库了，增加了库存，这个时候才可以退货</text><path d="M1281,220 C1000.5,220 1000.5,200 720,200" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="185" width="806" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1123" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">也有一些系统的采购退货单是基于采购订单来发起的，只要采购订单满足了某个状态，即意味着仓库已经收货了，所以可以发起采购退货</text><path d="M1281,220 C1000.5,220 1000.5,240 720,240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="225" width="403" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="921.5" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这两种方案都可以，没有明显优劣势之分，大家知道这个事情即可</text><path d="M440,240 C490,240 490,280 540,280" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="265" width="2051.66" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1565.83" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购员A在收到商品入库时发现有两台笔记本屏幕质量有问题，确认是商品本身的问题，确认要退货。【采购管理】→【采购退货单】，手工录入供应商，退货商品及数量、金额。 录入采购退货单时，选择供应商后，点“选源单”找到该供应商的所有采购出库单，选择要退货的商品； 在采购入库单列表，选择要退货的商品，点“退货”也可生成采购退货单。</text><path d="M108,0 C198,0 198,360 288,360" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="180" y="345" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">多张入库单合并退货</text><path d="M323,360 C341.5,360 341.5,320 360,320" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="305" width="1974.83" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1347.415" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购员A在收到商品入库时发现有部分商品有质量问题要退货，这些商品在多张单据上，想要一起做退货处理。在采购入库单列表，选择多张单据，点击“退货”，系统会自动合并生成退货单，执行结果上可以看到退货执行情况。 如果选择退货的供应商是同一家，则会生成一张退货单；供应商不同，则根据不同供应商生成不同的多张退货单。</text><path d="M323,360 C341.5,360 341.5,380 360,380" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="365" width="650" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="685" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">在进销存的场景下，多张入库单可以合并下推生成采购退货单，也就是同一个供应商的商品集中退货给供应商</text><path d="M1010,380 C775,380 775,360 540,360" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="345" width="767" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="923.5" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果退货的时候不要求溯源，那么多个入库单合并生成采购退货单是没问题的，实物不需要区分，也不需要标记来源于什么入库单</text><path d="M1010,380 C775,380 775,400 540,400" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="385" width="1027" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1053.5" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果退货的时候要溯源，即要知道退货单对应的是什么入库单，那实物就要做区分，仓库在打包发出的时候要标识清楚，这批退货对应的是什么退货单，它的原单是哪个入库单</text>
</svg>