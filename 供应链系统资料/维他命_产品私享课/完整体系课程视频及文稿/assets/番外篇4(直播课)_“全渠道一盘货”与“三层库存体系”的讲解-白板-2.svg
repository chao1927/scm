<rect x="-84" y="-18" width="168" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调度层层库存讲解</text><path d="M84,0 C174,0 174,-80 264,-80" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-95" width="182" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="271" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调度层和实物层库存的同步</text><path d="M84,0 C174,0 174,-40 264,-40" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="-55" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="277.5" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调度层库存的共享、分配处理</text><path d="M84,0 C174,0 174,0 264,0" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="-15" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="264.5" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调度层的库存查询和展示</text><path d="M84,0 C174,0 174,40 264,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="25" width="182" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="271" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调度层和销售层库存的同步</text><path d="M362,40 C361,40 361,40 360,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="25" width="2114.3199999999997" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1417.1599999999999" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">像天猫，京东，美团，饿了么等，这些三方平台系统属于外部系统，商家自身无法管控，就需要通过开放的API，向三方平台同步渠道库存。一般而言不会实时同步渠道库存，即只要有库存变动，就计算渠道库存，同步至三方平台。这种方式对系统压力较大，而且三方平台的API大多会按调用量收费，因此，会设定好时间间隔，定期同步渠道库存，例如5分钟一次。</text><path d="M84,0 C174,0 174,80 264,80" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="65" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他补充知识</text>
</svg>