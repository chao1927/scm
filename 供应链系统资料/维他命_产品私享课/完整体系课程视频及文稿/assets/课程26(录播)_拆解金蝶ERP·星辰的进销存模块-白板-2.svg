<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-176 -419 2173.63 838" width="2173.63" height="838"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-176" y="-419" width="2173.63" height="838" fill="#fff"/>
<rect x="-92" y="-18" width="184" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">金蝶星辰的拆解总结</text><path d="M92,0 C182,0 182,-280 272,-280" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-295" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应链类系统的角度</text><path d="M323,-280 C341.5,-280 341.5,-320 360,-320" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-335" width="559.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="639.76" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.星辰进销存模块的底层逻辑和七色米基本一样，只不过是针对的场景更复杂了，流程更丰富</text><path d="M323,-280 C341.5,-280 341.5,-280 360,-280" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-295" width="1074.71" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="897.355" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.通用型ERP，可以理解为是放大版或者是Pro Max版的“进销存财”，内核都是相通的，但是通用型ERP涉及的面除了供应链，还有其他领域，人力、客户、项目、薪酬福利、组织发展等</text><path d="M323,-280 C341.5,-280 341.5,-240 360,-240" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-255" width="905.3199999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="812.66" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.供应链类系统大多数的业务场景和功能模块都会体现出“进销存财”的底层逻辑，所以有机会从进销存或者通用型ERP入手，是一个很好的学习成长切入口</text><path d="M92,0 C182,0 182,-120 272,-120" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-135" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">业务角度</text><path d="M260,-120 C310,-120 310,-180 360,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-195" width="891.8" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="805.9" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.通用型ERP的业务相对来说都比较通用、抽象，所以会感觉很多场景很多，但是深度不是很够，比较少的和业务细节绑定，而是追求大而全，通用普适</text><path d="M1251.8,-180 C895.9,-180 895.9,-200 540,-200" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-215" width="657.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="868.64" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">感觉金蝶星辰什么都有，但是实际用起来会发现好像和自己的业务不太能直接串联起来，这是通用型ERP的短板</text><path d="M1251.8,-180 C895.9,-180 895.9,-160 540,-160" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-175" width="793.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="936.76" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">很多公司会把金蝶当做一个制单系统，只是把业务结果沉淀到金蝶中，然后通过金蝶去做“业财一体化”的打通，输出对应的财务报表等</text><path d="M260,-120 C310,-120 310,-120 360,-120" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-135" width="1553.6299999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1136.815" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.通用型ERP的功能模块多，用法也很多，具体怎么适配业务要结合实际的实施情况来输出方案，所以虽然两家公司都是用一套系统， 但是最后呈现出来的效果会非常不一样，取决于业务和系统是怎么结合的。所以ERP只是框架，还是要看实施方案怎么制定，怎么落地</text><path d="M1913.6299999999999,-120 C1226.815,-120 1226.815,-120 540,-120" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-135" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M260,-120 C310,-120 310,-80 360,-80" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-95" width="1217.84" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="968.92" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.通用型ERP的业务模块和功能模块划分边界比较清晰，例如说金蝶的产品会有很多的“XX云”，这些都是对业务场景和流程进行了解耦和拆分，对于要上手学习的人来说，可以比较专注深入学习某个具体的模块</text><path d="M1577.84,-80 C1058.92,-80 1058.92,-80 540,-80" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-95" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M260,-120 C310,-120 310,-40 360,-40" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-55" width="891.8" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="805.9" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.从通用型ERP的视角上可以学到很多宏观的、通用的业务知识，这些知识是具有普适性的，可以用于其他领域。先掌握通用型知识，再深耕专项型知识</text><path d="M92,0 C182,0 182,80 272,80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="65" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品设计角度</text><path d="M284,80 C322,80 322,0 360,0" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-15" width="495.55999999999995" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="607.78" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.星辰的很多通用性设计多，配置化的东西多，如果要做SaaS产品有很多可以学习</text><path d="M284,80 C322,80 322,40 360,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="25" width="533.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="626.76" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.金蝶的产品值得借鉴学习的东西多，交互设计，产品结构，帮助中心，功能模块解耦等</text><path d="M893.52,40 C716.76,40 716.76,40 540,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="25" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="670" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">后续会再出一篇关于金蝶的优秀设计拆解</text><path d="M284,80 C322,80 322,80 360,80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="65" width="560.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="640.28" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.星辰的CRUD功能做得很完善，很多细节都是经过了多年的打磨，可以直接站在巨人的肩膀上</text><path d="M284,80 C322,80 322,120 360,120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="105" width="689.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="704.76" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.单据的关联关系，单据的联动，还有多模块数据的调用等都做得很好，环环相扣，复杂业务都可以很好地串联起来</text><path d="M284,80 C322,80 322,160 360,160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="145" width="845.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="782.76" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">5.单据状态和行状态的结合，使得产品设计难度、复杂度都会陡增，越精细化的设计，使用成本和学习成本都会提升，所以要选择最合适的方案</text><path d="M92,0 C182,0 182,260 272,260" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="245" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他角度</text><path d="M260,260 C310,260 310,200 360,200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="185" width="416.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="568.26" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.可免费试用，有丰富的帮助手册，而且帮助手册写的很好，很仔细</text><path d="M260,260 C310,260 310,240 360,240" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="225" width="247.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="483.76" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.初始化引导流程做的很好，生动形象</text><path d="M260,260 C310,260 310,280 360,280" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="265" width="351.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="535.76" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.业务模块和业务知识很多，可以帮助产品经理见多识广</text><path d="M260,260 C310,260 310,320 360,320" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="305" width="481.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="600.76" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.有很多白皮书、客户案例、最佳实践等，可以让其他小微型企业直接拿来就用</text>
</svg>