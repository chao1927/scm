<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-136 -579 1475 1158" width="1475" height="1158"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-136" y="-579" width="1475" height="1158" fill="#fff"/>
<rect x="-52" y="-18" width="104" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">基础资料</text><path d="M52,0 C142,0 142,-320 232,-320" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="-335" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">核心基础资料</text><path d="M284,-320 C322,-320 322,-440 360,-440" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-455" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-435" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库</text><path d="M440,-440 C490,-440 490,-480 540,-480" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-495" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="624.5" y="-475" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库叫什么，编码是什么</text><path d="M440,-440 C490,-440 490,-440 540,-440" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-455" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="-435" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库的地址，收件人，位置，时区等</text><path d="M440,-440 C490,-440 490,-400 540,-400" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-415" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="611.5" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库的一些控制信息</text><path d="M284,-320 C322,-320 322,-320 360,-320" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-335" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="412" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客户（货主）</text><path d="M464,-320 C502,-320 502,-360 540,-360" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-375" width="221" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="650.5" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客户（货主）叫什么，编码是什么</text><path d="M464,-320 C502,-320 502,-320 540,-320" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-335" width="182" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="631" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客户的联系人，联系地址等</text><path d="M464,-320 C502,-320 502,-280 540,-280" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-295" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="611.5" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客户的一些控制信息</text><path d="M284,-320 C322,-320 322,-200 360,-200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-215" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品</text><path d="M440,-200 C490,-200 490,-240 540,-240" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="-255" width="241.28000000000003" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="660.64" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品的基础资料，SKU，条码，名称等</text><path d="M440,-200 C490,-200 490,-200 540,-200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="-215" width="299.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="689.76" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品的一些分类，尺寸，重量，效期，SN等信息</text><path d="M440,-200 C490,-200 490,-160 540,-160" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="-175" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="611.5" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品的一些控制信息</text><path d="M52,0 C142,0 142,180 232,180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="165" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他基础资料</text><path d="M284,180 C322,180 322,-100 360,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-115" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">库区</text><path d="M440,-100 C490,-100 490,-120 540,-120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-135" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="624.5" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库一共分了多少个区？</text><path d="M440,-100 C490,-100 490,-80 540,-80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-95" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">可能是物理的，可能是虚拟的</text><path d="M284,180 C322,180 322,0 360,0" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-15" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">库位</text><path d="M440,0 C490,0 490,-40 540,-40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-55" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="670" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库有多少库位，对应的库位编码是什么</text><path d="M440,0 C490,0 490,0 540,0" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-15" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="676.5" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">库位挂在库区下面，库位编码要具有唯一性</text><path d="M440,0 C490,0 490,40 540,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="25" width="372.8399999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="726.42" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有一些WMS还会有货架、巷(hàng)道（也称之为通道）的管理</text><path d="M284,180 C322,180 322,120 360,120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="105" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">容器</text><path d="M440,120 C490,120 490,80 540,80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="65" width="442" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="761" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库作业过程中需要一些容器盛放货物，需要知道货物放在了什么容器里</text><path d="M440,120 C490,120 490,120 540,120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="105" width="455" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="767.5" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">所以需要维护容器的一些基本信息，例如容器编码，容器名称，容器用途等</text><path d="M440,120 C490,120 490,160 540,160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="145" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="709" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">可以通过容器管理查看容器目前是否被占用，还是空闲</text><path d="M284,180 C322,180 322,240 360,240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">播种墙</text><path d="M440,240 C490,240 490,200 540,200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="185" width="507" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="793.5" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">播种墙和容器的管理方式类似，仓库中可能会有多个播种墙，所以需要维护这些信息</text><path d="M440,240 C490,240 490,240 540,240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="225" width="715" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="897.5" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">播种墙用于二次分拣使用，不同的播种墙行列数量不一样，最后的总格口数量也不一样，所以要和波次订单数量进行判断</text><path d="M440,240 C490,240 490,280 540,280" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="265" width="442" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="761" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">播种墙的格口代表订单，如果波次订单数量超过格口数，那就放不进去了</text><path d="M284,180 C322,180 322,360 360,360" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="345" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">包材</text><path d="M440,360 C490,360 490,320 540,320" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="305" width="468" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="774" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库出库的时候是将商品打包成了包裹，那就需要使用包装材料，这个是包材</text><path d="M440,360 C490,360 490,360 540,360" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="345" width="702" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="891" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">包材是有成本的，所以要对包材的使用进行统计，同时也有一些大型的仓库会对包材进行算法推荐，推荐最合适的包材</text><path d="M440,360 C490,360 490,400 540,400" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="385" width="475.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="777.64" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">例如菜鸟WMS仓库，包材的箱子数量有几十种，分别对应不同的体积和使用场景</text><path d="M1015.28,400 C867.64,400 867.64,400 720,400" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="385" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M284,180 C322,180 322,440 360,440" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="425" width="638.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="679.02" y="445" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">以上信息，大多数都是有编码的，需要被肉眼识别+PDA扫描的，所以都要做打印功能，支持打印条码和标签</text><path d="M284,180 C322,180 322,480 360,480" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="465" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="485" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">……</text>
</svg>