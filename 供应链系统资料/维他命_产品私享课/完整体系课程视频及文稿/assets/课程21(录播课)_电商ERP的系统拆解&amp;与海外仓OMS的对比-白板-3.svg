<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-216.95999999999998 -499 2212.8 998" width="2212.8" height="998"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-216.95999999999998" y="-499" width="2212.8" height="998" fill="#fff"/>
<rect x="-132.95999999999998" y="-18" width="265.91999999999996" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP、进销存、海外仓OMS的对比</text><path d="M132.95999999999998,0 C222.95999999999998,0 222.95999999999998,-320 312.96,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-335" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="238.5" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">核心的业务场景</text><path d="M297,-320 C328.5,-320 328.5,-400 360,-400" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-415" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">进销存</text><path d="M440,-400 C490,-400 490,-400 540,-400" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-415" width="1066" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1073" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">企业的生产经营无非就是手工开单、记账、管库存这三个流程，到电脑普及后，变成了手工开单、电脑记账、管库存，再到现在的互联网时代，变成了进销存软件开单、记账、管库存</text><path d="M297,-320 C328.5,-320 328.5,-320 360,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-335" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP</text><path d="M440,-320 C490,-320 490,-360 540,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-375" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP</text><path d="M620,-360 C670,-360 670,-360 720,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-375" width="872.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1156.02" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP的核心应该是聚合多个平台，集中化管理多个平台，多个店铺的一些电商业务，例如商品发布/刊登，订单处理，库存备货，财务利润分析等</text><path d="M440,-320 C490,-320 490,-320 540,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-335" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">传统ERP</text><path d="M620,-320 C670,-320 670,-320 720,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-335" width="1191.84" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1315.92" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP软件一般有生产管理、采购管理、销售管理、仓库管理、财务管理等模块。ERP软件更为注重生产过程中的控制，能够更好的调用企业资源。即使有些与进销存软件相同的模块，但是ERP软件更为精细。</text><path d="M440,-320 C490,-320 490,-280 540,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-295" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">内部ERP</text><path d="M620,-280 C670,-280 670,-280 720,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-295" width="624" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1032" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">聚合了企业内部的多种业务和场景，对大多数公司来说是综合性的后端管理系统，没有什么规律性和标准</text><path d="M297,-320 C328.5,-320 328.5,-240 360,-240" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-255" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">OMS</text><path d="M440,-240 C490,-240 490,-240 540,-240" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-255" width="580.8399999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="830.42" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">结合海外仓WMS的业务，给WMS推送对应的指令，例如入库，出库，退货等，属于WMS的客户端系统</text><path d="M132.95999999999998,0 C222.95999999999998,0 222.95999999999998,-160 312.96,-160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="-175" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">用户群体</text><path d="M260,-160 C310,-160 310,-200 360,-200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-215" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">进销存</text><path d="M440,-200 C490,-200 490,-200 540,-200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-215" width="468" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="774" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一般都是小微型团队或者公司用的比较多，体量不会太大，业务也不会太复杂</text><path d="M260,-160 C310,-160 310,-160 360,-160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-175" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP</text><path d="M440,-160 C490,-160 490,-160 540,-160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-175" width="554.3199999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="817.16" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">适用于多种多样的团队或者公司，尤其是SaaS的电商ERP，小团队可以用，中大型公司也会用</text><path d="M260,-160 C310,-160 310,-120 360,-120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-135" width="131.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="425.78" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">OMS（海外仓OMS）</text><path d="M491.56,-120 C515.78,-120 515.78,-120 540,-120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-135" width="900.1199999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="990.06" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一般都是和WMS配套使用，所以用户群体就是跨境电商卖家，OMS没有对接ERP的时候，给电商卖家临时性的使用，但是对接之后卖家一般都是在ERP上使用</text><path d="M132.95999999999998,0 C222.95999999999998,0 222.95999999999998,-40 312.96,-40" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="-55" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">研发成本和难度等</text><path d="M310,-40 C335,-40 335,-80 360,-80" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="-95" width="332.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="526.14" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP成本最高，难度最大，因为模块众多，场景也很多</text><path d="M310,-40 C335,-40 335,-40 360,-40" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="-55" width="754" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="737" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">进销存其次，因为进销存的模块也挺多，但是场景稍微简单一些，而且很多产功能不用做太深，要简化，要适配很多小微型客户</text><path d="M310,-40 C335,-40 335,0 360,0" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="-15" width="762.8399999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="741.42" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">海外仓OMS相对来说最简单，因为模块最少，而且场景也简单，本质是WMS的一个客户端管理系统，所以重点要理解WMS的一些业务</text><path d="M132.95999999999998,0 C222.95999999999998,0 222.95999999999998,100 312.96,100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="85" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="258" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品功能模块的相似点</text><path d="M336,100 C348,100 348,40 360,40" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="25" width="514.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="617.14" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.都有商品资料管理模块，因为供应链系统中商品/产品资料是最核心，最基础的资料</text><path d="M336,100 C348,100 348,80 360,80" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="65" width="1054.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="887.02" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.都有“进销存”的身影，都涉及到入库，出库和库存相关的内容，底层原理都是一样的，而且很多设计思路可以复用，只不过是业务不太一样，所以会有一些产品方案上的细微差别</text><path d="M336,100 C348,100 348,120 360,120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="105" width="782.0799999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="751.04" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.进销存和ERP都会涉及到一些采购，销售，财务这一块的内容，而海外仓OMS则一般不会有这些，只有入库，出库（出库单），库存</text><path d="M336,100 C348,100 348,160 360,160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="145" width="520.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="620.26" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.都是企业信息化建设中的重要系统，可以帮助企业实现信息化管理和业务流程自动化</text><path d="M132.95999999999998,0 C222.95999999999998,0 222.95999999999998,300 312.96,300" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="285" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对产品经理的要求</text><path d="M310,300 C335,300 335,240 360,240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="225" width="183.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="451.78" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.从自研和SaaS的角度分析</text><path d="M543.56,240 C541.78,240 541.78,200 540,200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="185" width="520" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="800" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">自研强调短平快，开发资源可能有限，产品经理要灵活快速响应需求，支撑业务的运转</text><path d="M543.56,240 C541.78,240 541.78,240 540,240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="225" width="664.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="872.02" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">SaaS则更看重产品的需求调研和分析能力，产品架构能力，要输出通用的解决方案，要兼顾上下游，多个用户等</text><path d="M543.56,240 C541.78,240 541.78,280 540,280" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="265" width="423.15000000000003" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="751.575" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">SaaS ERP和自研WMS对产品经理的要求都很高，前提还是要看业务模式</text><path d="M310,300 C335,300 335,340 360,340" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="325" width="169.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="444.76" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.从业务深度的角度分析</text><path d="M529.52,340 C534.76,340 534.76,320 540,320" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="305" width="437.84" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="758.92" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">综合来看，ERP的深度最高，WMS（OMS）的深度中间，进销存的深度较浅</text><path d="M529.52,340 C534.76,340 534.76,360 540,360" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="345" width="358.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="719.14" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">也就是说ERP比较考验对业务的理解程度，对行业的熟悉等</text><path d="M310,300 C335,300 335,400 360,400" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="385" width="234.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="477.26" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.从客户数据量（广度）的角度分析</text><path d="M594.52,400 C567.26,400 567.26,400 540,400" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="385" width="677.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="878.78" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">综合来看，进销存的客户数据量最多，可能有几十万级别的小微型用户，然后是ERP大概在万级，而WMS则在千级别</text>
</svg>