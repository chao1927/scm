<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-188.48000000000002 -1798.5 1866.48 3213" width="1866.48" height="3213"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-188.48000000000002" y="-1798.5" width="1866.48" height="3213" fill="#fff"/>
<rect x="-104.48" y="-18" width="208.96" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP采购的场景分析</text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,-460 284.48,-460" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-475" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="264.5" y="-455" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">维护供应商，管理供应商</text><path d="M349,-460 C354.5,-460 354.5,-500 360,-500" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-515" width="455" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="587.5" y="-495" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">较为复杂的供应商管理，会包含供应商准入、资质校验、协同、绩效考核等</text><path d="M815,-500 C677.5,-500 677.5,-520 540,-520" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-535" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-515" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M815,-500 C677.5,-500 677.5,-480 540,-480" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-495" width="319.8" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="699.9" y="-475" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">聚水潭ERP会有一个“聚货通”的模块，给供应商使用</text><path d="M349,-460 C354.5,-460 354.5,-420 360,-420" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-435" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="503" y="-415" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简易的供应商信息管理，只是基础信息的维护</text><path d="M646,-420 C593,-420 593,-440 540,-440" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-455" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-435" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M646,-420 C593,-420 593,-400 540,-400" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-415" width="358.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="719.14" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">店小秘ERP则只是对供应商信息进行一个基础的管理和维护</text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,-200 284.48,-200" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-215" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="258" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商业务中的采购方式</text><path d="M336,-200 C348,-200 348,-320 360,-320" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-335" width="91.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.76" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.简易采购</text><path d="M451.52,-320 C495.76,-320 495.76,-360 540,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-375" width="222.04000000000002" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="651.02" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">货物来源于1688，淘宝，拼多多等</text><path d="M451.52,-320 C495.76,-320 495.76,-320 540,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-335" width="260.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="670.26" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商业务主要是走“一件代发”的业务模式</text><path d="M451.52,-320 C495.76,-320 495.76,-280 540,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-295" width="598" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="839" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购方式比较简单，本质上就是消费者先下单，然后商家从代发的平台下单，然后发送到销售者手里</text><path d="M336,-200 C348,-200 348,-140 360,-140" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-155" width="91.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.76" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.标准采购</text><path d="M451.52,-140 C495.76,-140 495.76,-240 540,-240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-255" width="507" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="793.5" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">货物来源于供应商，供应商需要经过寻源，询报价，招投标，准入，合作等流程引入</text><path d="M451.52,-140 C495.76,-140 495.76,-200 540,-200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-215" width="397.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="738.64" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">通过下采购订单给到供应商，供应商发货之后，ERP通知仓库收货</text><path d="M451.52,-140 C495.76,-140 495.76,-100 540,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-115" width="319.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="699.64" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP的采购订单可能对接了供应商端，也可能没对接</text><path d="M859.28,-100 C789.64,-100 789.64,-140 720,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-155" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对接了</text><path d="M800,-140 C850,-140 850,-160 900,-160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="900" y="-175" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1036.5" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">需要提供供应商端的功能模块给供应商使用</text><path d="M800,-140 C850,-140 850,-120 900,-120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="900" y="-135" width="202.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1001.14" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">类似于SRM的采购端和供应商端</text><path d="M859.28,-100 C789.64,-100 789.64,-60 720,-60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-75" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">没对接</text><path d="M800,-60 C850,-60 850,-80 900,-80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="900" y="-95" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="997.5" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购订单是线下给到供应商的</text><path d="M800,-60 C850,-60 850,-40 900,-40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="900" y="-55" width="247" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1023.5" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购的协同也是通过线下的方式串联的</text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,40 284.48,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="25" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="277.5" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购订单的来源（需求来源）</text><path d="M375,40 C367.5,40 367.5,0 360,0" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-15" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="490" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">根据库存情况和销售预测来触发采购需求</text><path d="M620,0 C580,0 580,0 540,0" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-15" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M375,40 C367.5,40 367.5,40 360,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="25" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="444.5" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">人工测算，导入采购需求</text><path d="M529,40 C534.5,40 534.5,40 540,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="25" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M375,40 C367.5,40 367.5,80 360,80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="65" width="306.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="513.14" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP无采购需求的测算和分析，直接创建采购订单</text><path d="M666.28,80 C603.14,80 603.14,80 540,80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="65" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,200 284.48,200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="185" width="197.08" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="278.54" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP是否包含“WMS收货”模块？</text><path d="M377.08000000000004,200 C368.54,200 368.54,140 360,140" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="125" width="405.08" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="562.54" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有一些电商ERP自带一个小型的“WMS”模块，支持入库、出库等业务</text><path d="M765.0799999999999,140 C652.54,140 652.54,120 540,120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="105" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="676.5" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">入库清点、扫码收货、质检、退货入库验收</text><path d="M765.0799999999999,140 C652.54,140 652.54,160 540,160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="145" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">打单拣货、波次、扫码发货等</text><path d="M377.08000000000004,200 C368.54,200 368.54,200 360,200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="185" width="399.36" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="559.6800000000001" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果ERP不带“WMS”模块，则ERP的采购入库只需要轻量化处理即可</text><path d="M759.36,200 C649.6800000000001,200 649.6800000000001,200 540,200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="185" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M377.08000000000004,200 C368.54,200 368.54,260 360,260" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="245" width="451.36" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="585.6800000000001" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果ERP带了“WMS”模块，则ERP的采购入库需要考虑仓库端实际执行的操作</text><path d="M811.36,260 C675.6800000000001,260 675.6800000000001,240 540,240" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M811.36,260 C675.6800000000001,260 675.6800000000001,280 540,280" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="265" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,340 284.48,340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="325" width="136.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="248.38" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购计划/采购建议</text><path d="M316.76,340 C338.38,340 338.38,340 360,340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="325" width="494" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="607" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">建议采购量的公式配置，建议采购量的计算，采购计划的生成，采购计划的跟进等</text><path d="M854,340 C697,340 697,320 540,320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="305" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M854,340 C697,340 697,360 540,360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="345" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,400 284.48,400" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="385" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购订单</text><path d="M260,400 C310,400 310,400 360,400" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="385" width="416" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="568" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购订单的创建、导入、状态跟进、取消、与下游采购入库单联动等</text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,440 284.48,440" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="180" y="425" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="445" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购入库</text><path d="M260,440 C310,440 310,440 360,440" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="425" width="377" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="548.5" y="445" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购入库单的生成，库存的变动，采购对账数据回写采购订单</text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,480 284.48,480" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="180" y="465" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="485" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购质检</text><path d="M260,480 C310,480 310,480 360,480" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="465" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="529" y="485" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购质检单的创建，采购入库时质检、采购入库后质检</text><path d="M104.48,0 C194.48000000000002,0 194.48000000000002,520 284.48,520" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="505" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="525" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购退货</text><path d="M260,520 C310,520 310,520 360,520" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="505" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="516" y="525" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购退货单的创建、导入、状态跟进、取消、与等</text>
</svg>