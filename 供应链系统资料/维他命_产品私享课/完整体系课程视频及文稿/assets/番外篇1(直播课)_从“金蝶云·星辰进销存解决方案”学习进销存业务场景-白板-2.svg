<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-192 -359 2860.17 718" width="2860.17" height="718"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-192" y="-359" width="2860.17" height="718" fill="#fff"/>
<rect x="-108" y="-18" width="216" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">销售管理的核心业务场景</text><path d="M108,0 C198,0 198,-200 288,-200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-215" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">销售订单锁库</text><path d="M284,-200 C322,-200 322,-260 360,-260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-275" width="1586.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1153.26" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">九州商贸在客户下达订单后，需要对客户订单的库存进行锁定，不能挪为他用，若商品启用批次，需要能针对批次进行锁定。部分商贸型企业，根据现有库存量和采购在途量来录销售订单并对订单进行锁定（基于可用库存进行锁定，举例场景可用库存=即时库存+采购在途）</text><path d="M284,-200 C322,-200 322,-220 360,-220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-235" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M284,-200 C322,-200 322,-180 360,-180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-195" width="807.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="763.78" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">销售订单【审核】—销售占用增加—销售订单锁定【销售占用减少,锁定量增加】—销售订单出库【锁定量减少,占用量减少,即时库存减少】</text><path d="M284,-200 C322,-200 322,-140 360,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-155" width="1884.4799999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1302.2399999999998" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品A在仓库即时库存为10，可用库存参数仅勾选“已审核销售订单”，可用库存=10。新增该仓库销售订单2并审核，此时销售占用为2，即时库存为10，可用库存为8；进行订单锁库，锁库数量2，此时销售占用为0，即时库存为10，可用库存为8；订单全部完成出库确认，此时销售占用为0，锁定量为0，即时库存=可用库存=8。</text><path d="M108,0 C198,0 198,-80 288,-80" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="-95" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">批次保质期商品销售</text><path d="M323,-80 C341.5,-80 341.5,-80 360,-80" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-95" width="1739.6599999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1229.83" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">九州商贸销售了一批奶粉，在出库时，需要将生产日期最早的库存先发出。在系统参数——进销存参数——仓库参数中，设置“近效期先出”，则选择商品后，可自动带出最近到期的批次； 也可手工点开批次选择窗口，选择实际出库的批次； 批次商品出库，只能是出库有库存的批次，不允许负库存出库。</text><path d="M2099.66,-80 C1319.83,-80 1319.83,-100 540,-100" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="-115" width="1170" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1125" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一些带有保质期的商品需要进行效期管理，而效期管理其实是批次管理的一种经典案例。相同生产日期的商品可以认为是一个批次，只要选择对应的批次号就可以带出它的生产日期，保质期和失效日期</text><path d="M2099.66,-80 C1319.83,-80 1319.83,-60 540,-60" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="-75" width="689" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="884.5" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">近效期先出，就是查看失效时间最小的（最接近现在）批次是什么，然后带出对应的批次号，效期信息，库存信息等</text><path d="M108,0 C198,0 198,0 288,0" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-15" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="238.5" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">序列号商品销售</text><path d="M297,0 C328.5,0 328.5,0 360,0" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-15" width="2224.17" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1472.085" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">九州商贸销售了10台手机，为了售后保修，需要记录出库的每台手机的序列号。序列号商品出库，录入的序列号个数，与出库数量必须一致； 序列号录入有多种方式：手工录入序列号，从仓库中选择已有的序列号，自动生成序列号，也可以从其他文档复制粘贴而来； 序列号商品出库，只能是出库有库存的序列号，不允许负库存出库； 一个商品相同的序列号，在仓库中只能有一个。</text><path d="M2584.17,0 C1562.085,0 1562.085,-20 540,-20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-35" width="219.05" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="649.525" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">同一个SKU：iPhone 15 白色 128G</text><path d="M2584.17,0 C1562.085,0 1562.085,20 540,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="5" width="390" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="735" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">每一台手机都会有独一无二的序列号，所以这个也称之为唯一码</text><path d="M108,0 C198,0 198,100 288,100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="85" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">辅助属性商品销售</text><path d="M310,100 C335,100 335,100 360,100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="85" width="1737.1899999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1228.5949999999998" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">九州商贸销售了10件衣服，其中2件是红色S码，8件是蓝色M码需要在基础资料——辅助属性里增加属性分类“颜色”“尺码”，属性值新增红色，蓝色；S，M。该商品启用辅 助属性管理，并选择颜色尺码两种属性。在商品入库时，根据实际属性的数量入库，在销售时，需要选择明细的属性值并录入数量。</text><path d="M2097.1899999999996,100 C1318.5949999999998,100 1318.5949999999998,60 540,60" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="45" width="260.91" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="670.455" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">iPhone 15是SPU，也可以理解为一款商品</text><path d="M2097.1899999999996,100 C1318.5949999999998,100 1318.5949999999998,100 540,100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="85" width="182" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="631" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">颜色，内存，版本都是属性</text><path d="M2097.1899999999996,100 C1318.5949999999998,100 1318.5949999999998,140 540,140" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="125" width="471.1199999999999" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="775.56" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">白色、黑色、蓝色、128G、256G、512G、国行、港版、美版都是具体的属性值</text><path d="M108,0 C198,0 198,220 288,220" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="205" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">销售退货</text><path d="M260,220 C310,220 310,200 360,200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="185" width="767" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="743.5" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">金蝶的销售退货是基于销售出库单发起的，也就是销售出库单单审核了，意味着商品销售出库，扣减了库存，这个时候才可以退货</text><path d="M1127,200 C833.5,200 833.5,180 540,180" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="165" width="806" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="943" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">也有一些系统的销售退货单是基于销售订单来发起的，只要销售订单满足了某个状态，即意味着仓库已经发货了，所以可以发起销售退货</text><path d="M1127,200 C833.5,200 833.5,220 540,220" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="205" width="403" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="741.5" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这两种方案都可以，没有明显优劣势之分，大家知道这个事情即可</text><path d="M260,220 C310,220 310,260 360,260" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="245" width="2130.18" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1425.09" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">九州商贸销售了10台电脑，其中有2台电脑屏幕有质量问题，确认是商品本身的问题，客户确认要退货。【销售管理】→【销售退货单】，手工录入客户，退货商品及数量、金额。 录入销售退货单时，选择客户后，点“选源单”找到该客户的所有销售出库单和销售退货申请单，选择要退货的商品； 在销售出库单列表，选择要退货的商品，点“退货”也可生成销售退货单。</text>
</svg>