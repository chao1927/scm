<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-895 -737.625 2884 1681" width="2884" height="1681"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-895" y="-737.625" width="2884" height="1681" fill="#fff"/>
<rect x="-112.48" y="-18" width="224.96" height="36" rx="8" fill="rgb(245, 245, 245)" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP所解决的业务场景</text><path d="M112.48,0 C202.48000000000002,0 202.48000000000002,0 292.48,0" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="180" y="-15" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="264.5" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">按通俗业务的角度来理解</text><path d="M349,0 C354.5,0 354.5,-380 360,-380" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="-395" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">场景1</text><path d="M440,-380 C490,-380 490,-440 540,-440" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-455" width="1040" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1060" y="-435" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">张三要在淘宝开一个店铺，需要申请入驻平台。入驻平台之后，可以在电商平台的后端管理页面查看到自己的店铺情况，例如商品的上下架，订单情况，售后情况，物流情况等。</text><path d="M440,-380 C490,-380 490,-400 540,-400" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-415" width="676" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="878" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">淘宝店铺开的非常好，于是张三决定继续在京东开一个店铺，于是就又要登录京东的淘宝后台去看自己的店铺情况</text><path d="M440,-380 C490,-380 490,-360 540,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-375" width="663" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="871.5" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">以此类推，张三还要在拼多多，苏宁，国美，自营平台等都要开店，于是需要登录的后台管理系统就非常的多了</text><path d="M440,-380 C490,-380 490,-320 540,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-335" width="683.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="881.64" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP解决多店铺管理的问题，可以在一个软件上管理多个店铺的情况，避免重复登录、打开多个不同的系统后台</text><path d="M349,0 C354.5,0 354.5,-260 360,-260" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="-275" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">场景2</text><path d="M440,-260 C490,-260 490,-280 540,-280" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-295" width="950.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1015.28" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">张三的店铺主要是经营一些3C配件的，SKU很多，然后更新迭代也很快。每次上新品的时候，都要去不同的店铺后台编辑、维护商品信息（上架/刊登），特别麻烦</text><path d="M440,-260 C490,-260 490,-240 540,-240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-255" width="638.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="859.02" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP通过对接电商平台，实现商品的在线上架/刊登的功能，一个管理系统就可以分发到多个电商平台上</text><path d="M349,0 C354.5,0 354.5,-160 360,-160" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="-175" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">场景3</text><path d="M440,-160 C490,-160 490,-200 540,-200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-215" width="871" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="975.5" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不同的电商平台由于销量不一样或者运营活动的差异，所以需要准备的库存也不一样，而且根据每天的销量不同，平台上展示的可用库存也会不一样</text><path d="M440,-160 C490,-160 490,-160 540,-160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-175" width="1365" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1222.5" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果平台展示的可用库存不够了，但是实物却是够的，则会导致消费者无法下单造成损失；如果平台展示的可用库存是够的，但是实物却不够，则会导致消费者下单了之后商家不能及时发货，会被平台惩罚。所以，库存准确非常重要。</text><path d="M440,-160 C490,-160 490,-120 540,-120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-135" width="625.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="852.52" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP通过对接电商平台，获取平台的库存情况，也可以修改/调整平台的库存情况，与实物保持一致。</text><path d="M349,0 C354.5,0 354.5,-40 360,-40" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="-55" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">场景4</text><path d="M440,-40 C490,-40 490,-80 540,-80" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-95" width="852.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="966.14" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">消费者会在不同的平台下单，下单之后张三需要知道一共有哪些订单，然后才能安排发货，所以需要将多个电商平台的订单数据及时同步到ERP中</text><path d="M440,-40 C490,-40 490,-40 540,-40" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-55" width="1092" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1086" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">当张三为不同的店铺的订单都发货了之后，需要将这些发货信息收集归类，然后反馈给平台，这样平台才会通知消费者，您的订单已经发货，使用了什么物流，单号是什么，从哪里发出等</text><path d="M440,-40 C490,-40 490,0 540,0" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-15" width="800.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="940.14" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商ERP通过对接电商平台，及时拉取平台的订单，并告知自己的仓库进行发货，然后再将发货后的物流信息回传给平台，通知给消费者</text><path d="M349,0 C354.5,0 354.5,240 360,240" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">场景5</text><path d="M440,240 C490,240 490,60 540,60" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="540" y="45" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="598.5" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">消费者侧的场景</text><path d="M657,60 C688.5,60 688.5,40 720,40" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="25" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="798" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">售后、客户投诉的场景</text><path d="M657,60 C688.5,60 688.5,80 720,80" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="65" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="785" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">营销、运营的场景</text><path d="M440,240 C490,240 490,160 540,160" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="540" y="145" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="598.5" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓储管理的场景</text><path d="M657,160 C688.5,160 688.5,120 720,120" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="105" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">订单履约</text><path d="M657,160 C688.5,160 688.5,160 720,160" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="145" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购入库</text><path d="M657,160 C688.5,160 688.5,200 720,200" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="185" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">库存管理</text><path d="M440,240 C490,240 490,260 540,260" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="540" y="245" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="598.5" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商家经营的场景</text><path d="M657,260 C688.5,260 688.5,240 720,240" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="225" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="791.5" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">财务报表，利润分析</text><path d="M863,240 C881.5,240 881.5,240 900,240" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="900" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="940" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M657,260 C688.5,260 688.5,280 720,280" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="265" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="778.5" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">业务报表，分析</text><path d="M440,240 C490,240 490,380 540,380" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="540" y="365" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="598.5" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商侧的场景</text><path d="M657,380 C688.5,380 688.5,320 720,320" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="305" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="785" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">选品，寻源的场景</text><path d="M657,380 C688.5,380 688.5,360 720,360" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="345" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="765.5" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购的场景</text><path d="M657,380 C688.5,380 688.5,400 720,400" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="385" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="785" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商管理的场景</text><path d="M657,380 C688.5,380 688.5,440 720,440" fill="none" stroke="#B1C774" stroke-width="2"/><rect x="720" y="425" width="340.59999999999997" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="890.3" y="445" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">国内ERP关注的不是很多，会有单独的SRM/SCM管理系统</text><path d="M-112.48,0 C-202.48000000000002,0 -202.48000000000002,0 -292.48,0" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="-401" y="-15" width="221" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="-290.5" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">按产品架构设计的角度来定义功能</text><path d="M-401,0 C-380.5,0 -380.5,-260 -360,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="-440" y="-275" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="-400" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">运营侧</text><path d="M-440,-260 C-490,-260 -490,-320 -540,-320" fill="none" stroke="#E48484" stroke-width="2"/><rect x="-620" y="-335" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="-580" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">平台对接</text><path d="M-440,-260 C-490,-260 -490,-280 -540,-280" fill="none" stroke="#E48484" stroke-width="2"/><rect x="-657" y="-295" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="-598.5" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">多平台库存管理</text><path d="M-440,-260 C-490,-260 -490,-240 -540,-240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="-728.76" y="-255" width="188.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="-634.38" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品管理/商品发布、上下架</text><path d="M-440,-260 C-490,-260 -490,-200 -540,-200" fill="none" stroke="#E48484" stroke-width="2"/><rect x="-670" y="-215" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="-605" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">运营、营销活动等</text><path d="M-401,0 C-380.5,0 -380.5,-120 -360,-120" fill="none" stroke="#A287E1" stroke-width="2"/><rect