<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-160 -299 3896.1200000000013 598" width="3896.1200000000013" height="598"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-160" y="-299" width="3896.1200000000013" height="598" fill="#fff"/>
<rect x="-76" y="-18" width="152" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">批次的踩坑记录</text><path d="M76,0 C166,0 166,-140 256,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-155" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="284" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不要直接用日期格式去做批次号</text><path d="M388,-140 C374,-140 374,-200 360,-200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-215" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M388,-140 C374,-140 374,-160 360,-160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-175" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M388,-140 C374,-140 374,-120 360,-120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-135" width="2509.520000000003" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1614.7600000000016" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">当我想要做先进先出的时候，我就先定位到SKU，然后通过批次号的编码格式去做排序，找到更早（更小）的批次号。例如上图“20231206”就是大于“20231205”，所以如果要先进先出，则应该先出“20231205”这个批次的库存。这种方案的设计是最简单的，但是也非常容易踩坑，例如有一次我们因为某个原因要调整“批次号”的编码规则，我们把编码规则变成了“BN+YYYYMMDD+001”递增这种方式，结果系统就出现了不同规则的批次号。</text><path d="M388,-140 C374,-140 374,-80 360,-80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-95" width="832" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="776" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">批次号一定是要单独关联自己的一些信息，例如说创建时间，不能直接用批次号本身去排序比较大小，这样去做先进先出一定是会出问题的。</text><path d="M76,0 C166,0 166,0 256,0" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-15" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="310" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">为每个商品的不同批次定义不同的批次号</text><path d="M440,0 C400,0 400,-40 360,-40" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-55" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M440,0 C400,0 400,0 360,0" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-15" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M440,0 C400,0 400,40 360,40" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="25" width="3292.1200000000013" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="2006.0600000000006" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这种设计方案，如果只是用来做“先进先出”，“统计批次库龄”那么问题不是很大，因为同一天入库上架的商品，它们的批次号相同，上架日期也相同，在做先进先出和统计批次库龄的时候完全可以满足，而且批次号生成还比较简单清爽，不会给用户造成太多的困扰。但是这种方式也有一个比较大的弊端，那就是通过“批次号”去反查一些附带的信息时就会出现很多条信息，可能是相同的SKU，也可能是不同的SKU，这样在需要批次溯源或者其他精细化的批次管理的时候就会造成困扰。所以，我个人踩坑之后得出的结论是：建议为每个商品的不同批次定义不同的批次号。</text><path d="M76,0 C166,0 166,100 256,100" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="85" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="277.5" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">批次号单独用批次记录表管理</text><path d="M375,100 C367.5,100 367.5,80 360,80" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="65" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M375,100 C367.5,100 367.5,120 360,120" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="105" width="1540.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1130.38" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">基于上面第1个踩坑的设计，我个人建议一定是要单独用一个批次记录表去存储批次号相关的内容，而不是把批次号只关联在库存表上，最后的关联关系是这样的。有了批次记录表之后，就可以知道这个批次的创建时间和修改时间，还有批次管理的一些批次属性等。</text><path d="M76,0 C166,0 166,180 256,180" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="165" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="297" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">海外仓不需要太复杂的批次属性配置</text><path d="M414,180 C387,180 387,160 360,160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="145" width="1079.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="899.76" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">富勒的批次属性配置表太丰富了，最多可以支持24个批次属性。批次属性越丰富，意味着批次管理的维度就越精细，同时也意味着系统设计的难度更大，用户使用和学习的成本也越高。</text><path d="M414,180 C387,180 387,200 360,200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="185" width="2859.2200000000003" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1789.6100000000001" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对于海外仓来说，一般用到最多的批次属性就是：1. 入库日期，不同日期入库的商品是不同的批次，可以用来统计批次的库龄，计算仓租；2. 生产日期/失效日期，针对一些需要效期管理的商品，可以用效期的字段来区分不同的批次，便于后续的效期管理业务；其他的基本上就很少用到了，所以如果是为了高效率的设计海外仓WMS的批次，我建议可以引入“批次属性配置”这个模块，但是不要搞太多的“批次属性”，降低用户的理解和学习成本，同时也是结合实际业务做一些产品设计上的减法。</text>
</svg>