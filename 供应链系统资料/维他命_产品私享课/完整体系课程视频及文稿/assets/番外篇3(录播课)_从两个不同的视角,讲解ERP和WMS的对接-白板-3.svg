<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-160 -359 1653.8799999999999 828.25" width="1653.8799999999999" height="828.25"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-160" y="-359" width="1653.8799999999999" height="828.25" fill="#fff"/>
<rect x="-76" y="-18" width="152" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对接知识的总结</text><path d="M76,0 C166,0 166,-180 256,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-195" width="92.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="226.28" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP对接WMS</text><path d="M272.56,-180 C316.28,-180 316.28,-260 360,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-275" width="664.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="692.28" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP既要知道自己的需求和目的，又要知道外部WMS能提供什么服务和能力，这样才可以高效率地推荐对接的事项</text><path d="M272.56,-180 C316.28,-180 316.28,-220 360,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-235" width="521.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="620.78" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP对接外部WMS，本质上就是一个业务需求，只不过实现手段上会和技术有一定的关系</text><path d="M272.56,-180 C316.28,-180 316.28,-180 360,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-195" width="780" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="750" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品经理如果不太懂基础的技术知识，那么在对接过程中就会比较痛苦，因为很多名词不知道，很多逻辑不知道，所以得要先去学习</text><path d="M272.56,-180 C316.28,-180 316.28,-140 360,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-155" width="884" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="802" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">阅读对方的接口文档时，有很多不懂，不理解，不清楚的，这个是很正常的，可以多看两遍，结合对方的系统功能来看，实在不行就拉会议请对方解答</text><path d="M272.56,-180 C316.28,-180 316.28,-100 360,-100" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-115" width="741.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="730.76" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品经理最好是能输出“字段映射表”，这样可以知道请求了什么接口，推送了什么参数，懂得越多，越有利于后续的产品决策</text><path d="M76,0 C166,0 166,20 256,20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="5" width="189.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="274.64" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">WMS提供接口给外部客户对接</text><path d="M369.28,20 C364.64,20 364.64,-60 360,-60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-75" width="580.3199999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="650.16" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">作为接口提供方，要将这个事情当做一个新的产品来对待，OpenAPI也是一个新的项目，新的产品</text><path d="M369.28,20 C364.64,20 364.64,-20 360,-20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-35" width="827.3199999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="773.66" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">搭建OpenAPI平台要关注的细节很多，但是如果只是对外提供一个接口而已，那么很多事项可以省略，让研发多输出一些内容，你来走查把关</text><path d="M369.28,20 C364.64,20 364.64,20 360,20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="5" width="936" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="828" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对外提供什么接口，本质上还是取决于当前系统能有哪些功能，哪些服务，所以最好是先把系统功能打磨完善了再对外提供接口，否则接口文档可能就频繁改动</text><path d="M369.28,20 C364.64,20 364.64,60 360,60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="45" width="780" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="750" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品经理输出接口文档并不是什么惊奇或者小众的事情，只是很多产品既不懂技术，又不懂细节，所以就会觉得输出这个东西很惊讶</text><path d="M369.28,20 C364.64,20 364.64,100 360,100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="85" width="982.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="851.14" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">接口文档输出之后，一定要切换视角，把自己当作一个对接者，去看看能否快速get准确的信息，如果全权交给研发输出接口文档，大概率很多内容外部开发者都看不懂</text><path d="M76,0 C166,0 166,200 256,200" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="185" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">通用型的总结</text><path d="M284,200 C322,200 322,140 360,140" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="125" width="669.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="694.88" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">B端产品经理会对接其他系统的接口，也会提供自己系统的接口给外部，这两种能力都要学习，都要刻意练习提升</text><path d="M284,200 C322,200 322,180 360,180" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="165" width="676" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="698" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调研一些竞品的时候，没办法登录查看对方的系统，但是可以看接口文档，接口中的参数也可以看出一些业务逻辑</text><path d="M284,200 C322,200 322,220 360,220" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="205" width="636.9999999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="678.5" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">要养成用Google搜索“XX+OpenAPI”的能力，多收藏一些OpenAPI开放平台，积累的多了，能力就提升上来了</text><path d="M996.9999999999999,220 C768.5,220 768.5,220 540,220" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="205" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif"></text><path d="M284,200 C322,200 322,260 360,260" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="245" width="1049.8799999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="884.9399999999999" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有一些接口文档展示的时候并不是用表格，产品经理需要整理成表格的形式去输出“字段映射表”，可以用KIMI的图片识别功能或者文本处理功能，将XML或者JSON的内容转化为表格</text><path d="M1409.8799999999999,260 C974.9399999999999,260 974.9399999999999,260 540,260" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="245" width="336.9599999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="708.4799999999999" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">https://www.yuque.com/huice-wiki/bhxv6e/rlk3ar</text>
</svg>