<rect x="-132.32" y="-18" width="264.64" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">拆解“进销存类系统”的作业框架</text><path d="M132.32,0 C222.32,0 222.32,-300 312.32,-300" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-315" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品及公司的介绍</text><path d="M310,-300 C335,-300 335,-320 360,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-335" width="416" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="568" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这个产品是什么，哪家公司的，成立了多久，有多少用户，什么成绩</text><path d="M310,-300 C335,-300 335,-280 360,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-295" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="535.5" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">可以从官网或者其他渠道收集一下，解释一下产品的背景</text><path d="M132.32,0 C222.32,0 222.32,-200 312.32,-200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-215" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品主要价值</text><path d="M284,-200 C322,-200 322,-240 360,-240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-255" width="325" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="522.5" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品的定位是什么，用户群体是谁，解决了什么问题</text><path d="M284,-200 C322,-200 322,-200 360,-200" fill="none" st