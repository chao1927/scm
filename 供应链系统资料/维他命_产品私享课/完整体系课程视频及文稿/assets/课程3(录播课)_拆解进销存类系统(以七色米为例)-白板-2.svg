="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="25" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">功能清单</text><path d="M260,40 C310,40 310,0 360,0" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-15" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="457.5" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有哪些菜单，有哪些功能模块</text><path d="M260,40 C310,40 310,40 360,40" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="25" width="299" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="509.5" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不同的菜单和功能模块，大概是解决了什么问题</text><path d="M260,40 C310,40 310,80 360,80" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="65" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="516" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">哪些功能模块是核心的模块，哪些可能是非核心的</text><path d="M132.32,0 C222.32,0 222.32,160 312.32,160" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="145" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">具体功能模块拆解</text><path d="M310,160 C335,160 335,120 360,120" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="105" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="535.5" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">拆解了哪些核心模块，这些核心模块解决了什么业务问题</text><path d="M310,160 C335,160 335,160 360,160" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="145" width="390" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="555" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这些模块和上下游是怎么串联的，这些模块的数据是怎么流通的</text><path d="M310,160 C335,160 335,200 360,200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="185" width="325" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="522.5" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这些模块设计的亮点是什么，好的、不好的点是什么</text><path d="M132.32,0 C222.32,0 222.32,280 312.32,280" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="265" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一些启发性的总结</text><path d="M310,280 C335,280 335,240 360,240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="225" width="377" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="548.5" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">在拆解完了之后，对这款产品的评价是怎么样的？主观的感受</text><path d="M737,240 C638.5,240 638.5,240 540,240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="225" width="92.03999999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="586.02" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">SWOT也可以</text><path d="M310,280 C335,280 335,280 360,280" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="265" width="442" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="581" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">拆解的这款产品设计好的点在哪里，对自己有启发，值得学习的点在哪里</text><path d="M310,280 C335,280 335,320 360,320" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="305" width="442" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="581" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">体验的过程中有哪些点是你没明白，有疑问，不理解的，引发自己思考的</text>
