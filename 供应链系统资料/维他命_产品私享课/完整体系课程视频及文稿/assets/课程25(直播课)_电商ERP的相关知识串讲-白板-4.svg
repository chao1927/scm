<defs></defs>
<rect x="-160" y="-1035.25" width="1642" height="1954.25" fill="#fff"/>
<rect x="-76" y="-18" width="152" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓储产品结构图</text><path d="M76,0 C166,0 166,-480 256,-480" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-495" width="110.75999999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="235.38" y="-475" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库授权/管理</text><path d="M290.76,-480 C325.38,-480 325.38,-780 360,-780" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-795" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="418.5" y="-775" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">需求分析、背景</text><path d="M477,-780 C508.5,-780 508.5,-820 540,-820" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-835" width="566.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="823.14" y="-815" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP需要对接外部的一些仓库，这些仓库会涉及到多个业务接口，需要将有需要的接口都对接上</text><path d="M477,-780 C508.5,-780 508.5,-780 540,-780" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-795" width="727.87" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="903.935" y="-775" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">针对SaaS ERP，涉及到仓库授权相关的内容，需要抽出来做成配置化，支持不同的租户去配置自己的账号，完成仓库的授权</text><path d="M477,-780 C508.5,-780 508.5,-740 540,-740" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-755" width="858" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="969" y="-735" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">完成了多个仓库的授权之后，则还需要对这些授权的仓库进行集中的管理，例如说仓库信息的编辑，授权信息的更新，还有对应的业务参数的配置</text><path d="M290.76,-480 C325.38,-480 325.38,-540 360,-540" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-555" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="412" y="-535" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">初步方案设计</text><path d="M464,-540 C502,-540 502,-640 540,-640" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-655" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-635" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">业务设计</text><path d="M620,-640 C670,-640 670,-700 720,-700" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-715" width="325" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="882.5" y="-695" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">需要对接多少个仓库？这些仓库需要对接哪些接口？</text><path d="M620,-640 C670,-640 670,-660 720,-660" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-675" width="390" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="915" y="-655" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库的对接有什么要求？是否需要提起让业务人员介入，沟通等</text><path d="M620,-640 C670,-640 670,-620 720,-620" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-635" width="572" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1006" y="-615" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对接了仓库之后，需要用到仓库的哪些服务？这些服务是不是都可以通过接口完成数据的推送？</text><path d="M620,-640 C670,-640 670,-580 720,-580" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-595" width="429" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="934.5" y="-575" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对接了仓库之后，仓库的库存是怎么查询的，能看到什么维度的库存？</text><path d="M464,-540 C502,-540 502,-460 540,-460" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-475" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-455" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">应用设计</text><path d="M620,-460 C670,-460 670,-540 720,-540" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-555" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="856.5" y="-535" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库授权的配置信息有哪些，要怎么填写？</text><path d="M620,-460 C670,-460 670,-500 720,-500" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-515" width="403" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="921.5" y="-495" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库授权之后，有哪些业务配置是必须要做的？是否有通用的地方</text><path d="M620,-460 C670,-460 670,-460 720,-460" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-475" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="817.5" y="-455" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库管理需要管理哪些内容？</text><path d="M620,-460 C670,-460 670,-420 720,-420" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-435" width="345.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="892.64" y="-415" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP的库存记录和仓库的关联关系，库存记录的颗粒度等</text><path d="M620,-460 C670,-460 670,-380 720,-380" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-395" width="332.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="886.14" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP需要推送哪些信息给仓库，推送哪些单据给仓库？</text><path d="M290.76,-480 C325.38,-480 325.38,-320 360,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-335" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="412" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品功能结构</text><path d="M464,-320 C502,-320 502,-340 540,-340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-355" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="-335" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库授权信息的添加，更新，删除等</text><path d="M464,-320 C502,-320 502,-300 540,-300" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-315" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库信息的查看，业务配置的维护等</text><path d="M290.76,-480 C325.38,-480 325.38,-200 360,-200" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-215" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="412" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品信息结构</text><path d="M464,-200 C502,-200 502,-260 540,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-275" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="592" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">基础信息字段</text><path d="M464,-200 C502,-200 502,-220 540,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-235" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">状态定义</text><path d="M464,-200 C502,-200 502,-180 540,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-195" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="592" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品明细字段</text><path d="M464,-200 C502,-200 502,-140 540,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-155" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="592" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">参考竞品即可</text><path d="M76,0 C166,0 166,260 256,260" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="245" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库的一些基础操作</text><path d="M323,260 C341.5,260 341.5,-80 360,-80" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="-95" width="117" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="418.5" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">需求分析、背景</text><path d="M477,-80 C508.5,-80 508.5,-100 540,-100" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="-115" width="624" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="852" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">除了采购、销售、退货等常见的业务单据需要和仓库交互之外，还有一些不太常见的单据也要和仓库交互</text><path d="M477,-80 C508.5,-80 508.5,-60 540,-60" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="-75" width="789.3599999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="934.68" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">考虑到ERP除了需要对接外部的仓库系统，自身还会有一些仓库模块的操作，类似于小型“WMS”，所以需要在ERP上设计相关的功能模块</text><path d="M323,260 C341.5,260 341.5,120 360,120" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="105" width="104" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="412" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">初步方案设计</text><path d="M464,120 C502,120 502,40 540,40" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="25" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">业务设计</text><path d="M620,40 C670,40 670,-20 720,-20" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="-35" width="384.79999999999995" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="912.4" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">小型WMS的能力边界是在哪里？是否要精确到库位、批次、SN等</text><path d="M620,40 C670,40 670,20 720,20" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="5" width="397.28000000000003" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="918.64" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库端使用ERP中的仓储模块是用来做哪些管理？哪些是不支持的</text><path d="M620,40 C670,40 670,60 720,60" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="45" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="863" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓储模块要支持哪些场景，不支持哪些场景？</text><path d="M620,40 C670,40 670,100 720,100" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="85" width="390" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="915" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓储模块的用户除了仓库人员之外，还会有其他的业务人员吗？</text><path d="M464,120 C502,120 502,200 540,200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="185" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">应用设计</text><path d="M620,200 C670,200 670,140 720,140" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="125" width="182" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="811" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓储模块有哪些功能清单？</text><path d="M620,200 C670,200 670,180 720,180" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="165" width="378.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="909.28" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">哪些功能是可以ERP自己闭环，有哪些是要和外部WMS对接的？</text><path d="M620,200 C670,200 670,220 720,220" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="205" width="429" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="934.5" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不同的业务单据的单据状态分别有什么，和下游的交互流程是怎么样的</text><path d="M620,200 C670,200 670,260 720,260" fill="none" stroke="#77C386" stroke-width="2"/><rect x="720" y="245" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="876" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不同的单据和下游系统交互时，库存是怎么变动的</text><path d="M323,260 C341.5,260 341.5,380 360,380" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="365" width="104" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="412" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品功能结构</text><path d="M464,380 C502,380 502,300 540,300" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="285" width="80" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="580" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">入库单</text><path d="M464,380 C502,380 502,340 540,340" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="325" width="80" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="580" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">出库单</text><path d="M464,380 C502,380 502,380 540,380" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="365" width="80" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="580" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">盘点单</text><path d="M464,380 C502,380 502,420 540,420" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="405" width="80" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="580" y="425" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调拨单</text><path d="M464,380 C502,380 502,460 540,460" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="445" width="80" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="580" y="465" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">调整单</text><path d="M323,260 C341.5,260 341.5,560 360,560" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="545" width="104" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="412" y="565" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品信息结构</text><path d="M464,560 C502,560 502,500 540,500" fill="none" stroke="#77C386