<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-200 -214.25 1173 444" width="1173" height="444"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-200" y="-214.25" width="1173" height="444" fill="#fff"/>
<rect x="-116" y="-18" width="232" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应链系统中常见的主数据</text><path d="M116,0 C206,0 206,-80 296,-80" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="-95" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">商品</text><path d="M260,-80 C310,-80 310,-100 360,-100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-115" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="516" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有些系统叫货品，产品，物料，都是表示一个意思</text><path d="M260,-80 C310,-80 310,-60 360,-60" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="-75" width="429" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="574.5" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应链系统中，商品是最基础，最重要的数据，在多个系统中都会存在</text><path d="M116,0 C206,0 206,-20 296,-20" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="-35" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商</text><path d="M260,-20 C310,-20 310,-20 360,-20" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-35" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="516" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商信息在供应链系统中，一般和采购业务有关</text><path d="M116,0 C206,0 206,20 296,20" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="5" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客户</text><path d="M260,20 C310,20 310,20 360,20" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="5" width="299" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="509.5" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客户信息在供应链系统中，一般和销售业务有关</text><path d="M116,0 C206,0 206,60 296,60" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="45" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库</text><path d="M260,60 C310,60 310,60 360,60" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="45" width="468" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="594" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">仓库信息是供应链系统中高频出现，往往和库存有关系，即和商品有密切关系</text><path d="M116,0 C206,0 206,100 296,100" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="180" y="85" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="220" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">组织架构</text><path d="M260,100 C310,100 310,100 360,100" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="85" width="377" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="548.5" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">在一些较为复杂的业务场景中，组织架构也是很重要的主数据</text>
</svg>