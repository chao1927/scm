<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-160 -487.75 3269.6 1181" width="3269.6" height="1181"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-160" y="-487.75" width="3269.6" height="1181" fill="#fff"/>
<rect x="-76" y="-18" width="152" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购的一些场景</text><path d="M76,0 C166,0 166,-220 256,-220" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="-235" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="258" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商的生命周期管理</text><path d="M336,-220 C348,-220 348,-320 360,-320" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-335" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商寻源</text><path d="M336,-220 C348,-220 348,-280 360,-280" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-295" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商准入</text><path d="M336,-220 C348,-220 348,-240 360,-240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-255" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商合作</text><path d="M336,-220 C348,-220 348,-200 360,-200" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-215" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商评估</text><path d="M336,-220 C348,-220 348,-160 360,-160" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-175" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商分级</text><path d="M336,-220 C348,-220 348,-120 360,-120" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-135" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应商淘汰</text><path d="M76,0 C166,0 166,-40 256,-40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-55" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="238.5" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">与供应商的协同</text><path d="M297,-40 C328.5,-40 328.5,-80 360,-80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-95" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">订单协同</text><path d="M297,-40 C328.5,-40 328.5,-40 360,-40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-55" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">收发货管理</text><path d="M297,-40 C328.5,-40 328.5,0 360,0" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-15" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对账结算</text><path d="M76,0 C166,0 166,180 256,180" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="165" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="225.5" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购的单据</text><path d="M271,180 C315.5,180 315.5,40 360,40" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="25" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购需求</text><path d="M440,40 C490,40 490,40 540,40" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="25" width="1373.1899999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1226.5949999999998" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购需求是指企业根据生产计划、销售预测或库存状况确定的对原材料、商品或服务的需求量。它是采购流程的起点，通常由需求计划（Demand Planning）过程生成，反映了企业在未来一段时间内需要购买的商品或服务的类型和数量。</text><path d="M271,180 C315.5,180 315.5,80 360,80" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="65" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购计划</text><path d="M440,80 C490,80 490,80 540,80" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="65" width="1534" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1307" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购计划是在确定采购需求的基础上，进一步制定的详细采购策略和时间表。它包括选择供应商、确定采购数量、价格谈判、交货时间安排等。采购计划是企业供应链管理中的重要组成部分，需要考虑成本、质量、交货时间等多个因素，以确保供应链的高效运作。</text><path d="M271,180 C315.5,180 315.5,120 360,120" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="105" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购订单</text><path d="M440,120 C490,120 490,120 540,120" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="105" width="1105" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1092.5" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购订单是企业与供应商之间正式的购买协议，详细记录了购买的商品或服务的规格、数量、价格、交货日期等信息。一旦采购订单被供应商确认，它就成为双方履行合同义务的法律文件。</text><path d="M271,180 C315.5,180 315.5,160 360,160" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="145" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购入库单</text><path d="M451,160 C495.5,160 495.5,160 540,160" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="145" width="1495" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1287.5" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购入库单是记录供应商交付商品到达企业仓库并被验收入库的凭证。它通常包含商品的详细信息，如商品名称、规格、数量、批次号、生产日期、有效期等，以及供应商信息和入库日期。入库单是仓库管理的重要文档，用于确保库存的准确性和可追溯性。</text><path d="M271,180 C315.5,180 315.5,200 360,200" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="185" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购对账单</text><path d="M451,200 C495.5,200 495.5,200 540,200" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="185" width="1664" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1372" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购对账单是企业与供应商之间核对交易记录的文档。它通常包括供应商在一定时期内发出的所有货物的详细信息，以及相应的价格和数量。企业会根据采购入库单和采购订单与对账单进行核对，确保双方记录的一致性。对账单是结算前的重要步骤，有助于发现和解决任何差异或错误。</text><path d="M271,180 C315.5,180 315.5,240 360,240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购发票</text><path d="M440,240 C490,240 490,240 540,240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="225" width="1729" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1404.5" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购发票是供应商向企业开具的正式账单，用于请求支付所提供商品或服务的费用。它包含了交易的所有关键信息，如供应商和企业的信息、商品或服务的描述、数量、单价、总金额、税率、付款条件等。采购发票是企业会计和财务管理的重要依据，也是企业进行税务申报和财务审计的关键文档。</text><path d="M271,180 C315.5,180 315.5,280 360,280" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="265" width="1313" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="1016.5" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购需求是采购计划的基础，没有明确的需求，就无法制定有效的采购计划。采购计划是对采购需求的具体化和操作化，它指导企业如何满足这些需求。采购订单是采购计划的执行阶段，是将计划转化为实际购买行为的文档。</text><path d="M1673,280 C1106.5,280 1106.5,280 540,280" fill="none" stroke="#BFBFBF" stroke-width="2"/><rect x="540" y="265" width="2485.6" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="1782.8" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">案例说明：假设一家服装零售商根据销售预测确定下个季度需要采购1000件T恤。这个需求量就是采购需求。然后，零售商会制定采购计划，决定从哪个供应商采购，以什么价格采购，以及何时交货。最后，零售商向供应商发出采购订单，明确1000件T恤的具体规格、单价、总价和期望的交货日期。在实际操作中，这三个概念是动态循环的过程，采购订单的执行情况会反馈给采购计划，进而影响未来的采购需求预测和计划调整。</text><path d="M271,180 C315.5,180 315.5,320 360,320" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="305" width="1443" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="1081.5" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">采购入库单是采购流程的物理接收证明，确保实际收到的商品与采购订单相符。采购对账单是交易记录的核对过程，确保双方对交易的理解和记录一致。采购发票是财务结算的依据，是供应商请求付款的正式文件，也是企业记录成本和费用的依据。</text><path d="M1803,320 C1171.5,320 1171.5,320 540,320" fill="none" stroke="#BFBFBF" stroke-width="2"/><rect x="540" y="305" width="2184" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="1632" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">假设一家电子产品制造商从供应商处采购了一批电脑配件。当配件到达仓库并经过质量检验后，制造商会出具采购入库单，记录收到的商品信息。随后，制造商会收到供应商提供的采购对账单，上面详细列出了所有发出的商品和相关费用。制造商将对账单与自己的记录进行核对，确认无误后，会根据采购发票向供应商支付相应的款项。这个过程确保了交易的透明性和准确性。</text>
</svg>