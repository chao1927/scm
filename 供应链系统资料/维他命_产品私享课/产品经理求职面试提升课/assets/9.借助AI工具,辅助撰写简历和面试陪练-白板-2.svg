<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-136 -779.5 6442.510000000006 1229" width="6442.510000000006" height="1229"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-136" y="-779.5" width="6442.510000000006" height="1229" fill="#fff"/>
<rect x="-52" y="-18" width="104" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">优化简历</text><path d="M52,0 C142,0 142,-260 232,-260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-275" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">输出简历模板</text><path d="M284,-260 C322,-260 322,-260 360,-260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-275" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">参考提示词</text><path d="M451,-260 C495.5,-260 495.5,-260 540,-260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-275" width="4237.480000000005" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="2658.7400000000025" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">你是一个资深的供应链产品经理，熟悉多个供应链系统从0到1的搭建，包含但不限于WMS，SRM，ERP，OMS，TMS等，现在我需要写一份类似的简历，请你根据网络上比较优秀的简历模板，虚拟编辑一份简历，以供我参考学习。简历一共分成这么几个部分：1.基础信息，展示个人的姓名，电话，年龄，求职意向等2.自我评价：供应链产品经理工作时长8年左右，分成多个小点结构化地展示自己的业务能力和产品能力3.工作经历：4家，要体现公司介绍，任职岗位和所取得的成绩4.项目经历：4个项目，要采用STAR法则来编写项目经历5.教育背景：占位符表示即可简历大概在1500字以内，要突出对供应链业务的熟练度，同时也突出对供应链系统的从0到1的项目落地经验，简历要有数据化的内容，有信服力，采用Markdown的形式表现。</text><path d="M52,0 C142,0 142,-160 232,-160" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-175" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">输出个人亮点总结</text><path d="M310,-160 C335,-160 335,-220 360,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-235" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">参考提示词</text><path d="M451,-220 C495.5,-220 495.5,-220 540,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-235" width="2764.32" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1922.16" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">【角色】你是一个资深的产品经理，有丰富的产品面试经历，也面试过很多个初中级的产品经理，熟悉常见的产品经历简历。【背景】我现在需要写一份B端产品经理的简历，但是我不太知道怎么在简历上的“个人亮点”部分去突出自己的能力，让面试官可以看到这个部分就被吸引。【任务】请你帮我写出5个不同风格，但是优秀的“个人亮点”模板，让我参考学习【要求】每个模板必须要大于4句话，个人亮点要围绕产品经理的工作，要有结构化，可以从大到小去输出自己的亮点</text><path d="M310,-160 C335,-160 335,-140 360,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-155" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="412" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他提问方式</text><path d="M464,-140 C502,-140 502,-180 540,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-195" width="443.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="761.52" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.给AI一段你写的产品个人亮点总结，请他帮你润色，修改，或者是补充</text><path d="M983.04,-180 C851.52,-180 851.52,-180 720,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-195" width="5502.510000000006" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="3471.255000000003" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">【角色】你是一个资深的产品经理，有丰富的产品面试经历，也面试过很多个初中级的产品经理，熟悉常见的产品经历简历。【背景】我正在写简历，但是简历中的“个人亮点”部分写的不太好，我希望你帮我润色修改一下。【任务】我会给你一段我已经写好的简历中的“个人亮点”，请你帮我润色修改一下，让它阅读起来更顺畅，更加能体现出我的专业能力，更能打动面试官【我写好的简历】“具备丰富的项目制产品交付方案设计能力，过往负责过多个大型项目交付，包含XX有限公司，XXX有限公司等， 擅长KA型大客户的需求分析和项目进度管控等。 在财务ERP领域拥有多年的实施和业务管理经验，曾成功主导过多个ERP项目的实施与优化，在提升企业财务管理 效率和推动数字化转型方面具有丰富的实战经验。 基于对市场动态和内外部业务的敏锐洞察，制定并实施具有前瞻性的产品解决方案，有效提升了客户满意度至90% 以上，并协同跨职能团队，确保了项目交付率达到95%以上。”【要求】采用不同的风格去修改和润色，提供3种不同的版本给我</text><path d="M464,-140 C502,-140 502,-140 540,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-155" width="495.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="787.52" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.给出你之前工作所负责的一些系统和项目，让AI学习，然后总结提炼出你的亮点</text><path d="M1035.04,-140 C877.52,-140 877.52,-140 720,-140" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="720" y="-155" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="765.5" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提示词省略</text><path d="M464,-140 C502,-140 502,-100 540,-100" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-115" width="417.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="748.52" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.给一个网络上的自我评价的模板，让AI工具学习并模仿，然后输出</text><path d="M52,0 C142,0 142,0 232,0" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-15" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">输出工作经历</text><path d="M284,0 C322,0 322,0 360,0" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-15" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,0 C490,0 490,-60 540,-60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-75" width="404.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="742.02" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.给AI一段你写好的工作经历，请他帮你润色，修改，或者是补充</text><path d="M944.04,-60 C832.02,-60 832.02,-60 720,-60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="720" y="-75" width="91" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="765.5" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提示词省略</text><path d="M440,0 C490,0 490,-20 540,-20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-35" width="274.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="677.02" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.让AI帮你写一个范例参考，让你启发一下</text><path d="M440,0 C490,0 490,40 540,40" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="25" width="378.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="729.02" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.让AI点评一下你写的简历中的公司经历，了解哪里需要修改</text><path d="M918.04,40 C819.02,40 819.02,20 720,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="720" y="5" width="3084.640000000002" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="2262.320000000001" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">【角色】你是一个资深的产品经理，有丰富的产品面试经历，也面试过很多个初中级的产品经理，熟悉常见的产品经历简历。【背景】我正在写简历，但是简历中的“工作经历”部分写的不太好，我希望你帮我润色修改一下。【任务】我会给你一段我已经写好的简历中的“工作经历”，请你帮我指出一些修改意见，让我的简历更专业，更能吸引面试官【要求】当你明确了我的问题之后，请回复“已明确”，随后我就会提供我写好的简历内容给你。你给出的修改意见需要使用Markdown的形式输出，让我了解你改了哪些，具体的意见是什么</text><path d="M918.04,40 C819.02,40 819.02,60 720,60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="720" y="45" width="5198.440000000008" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="3319.220000000004" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">20xx.xx-20xx.xx  xxxx有限公司 —— 高级产品经理公司情况 xxx公司是一家跨境电商公司，以家具户外，3C产品为主，涉及多个跨境电商平台，同时也在海外多个国家自营了N个仓库。公司大概有xx人，其中产研人数xxx人，自研型信息系统大概有xx个，包含ERP，WMS、SRM等。工作职责/内容在团队中担任高级产品经理一职位，也负责产品团队（共x人）的日常管理工作。除了产品团队的管理与培养等外，还负责xxx系统，xxx系统，xxx系统的产品规划，产品方案设计，项目管理和落地实施等工作。工作成绩● 主导xxx系统从0到1的产品工作，3个月内完成MVP版本，X个月共引入XX客户，提前完成了初期的项目目标，推动项目顺利度过市场验证阶段；● 从0到1搭建了团队整套的产品工作制度和规范流程，涵盖了从需求规划到实际落地上线的全套流程，大大降低了团队协作的阻碍，缩短了新人入职后的磨合周期；● 多次获得季度个人绩效“S”评分，2次年度个人绩效“S”评分，1次年度最佳团队称号；</text><path d="M52,0 C142,0 142,120 232,120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="105" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">输出项目经历</text><path d="M284,120 C322,120 322,120 360,120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="105" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,120 C490,120 490,100 540,100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="85" width="391.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="735.52" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.给AI一段你写的工作经历，请他帮你润色，修改，或者是补充</text><path d="M440,120 C490,120 490,140 540,140" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="125" width="274.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="677.02" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.让AI帮你写一个范例参考，让你启发一下</text><path d="M52,0 C142,0 142,200 232,200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="185" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">优化简历结构</text><path d="M284,200 C322,200 322,200 360,200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="185" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,200 C490,200 490,180 540,180" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="165" width="365.03999999999996" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="722.52" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.给AI一段你写的简历，请他帮你润色，修改，或者是补充</text><path d="M440,200 C490,200 490,220 540,220" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="205" width="274.03999999999996" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="677.02" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.让AI帮你写一个范例参考，让你启发一下</text><path d="M52,0 C142,0 142,260 232,260" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="245" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="277.5" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">优化简历错别字，文案表达等</text><path d="M375,260 C367.5,260 367.5,260 360,260" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="245" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,260 C490,260 490,260 540,260" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="245" width="358.8" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="719.4" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.直接提交你的PDF简历给它，然后让他给你提供修改意见</text>
</svg>