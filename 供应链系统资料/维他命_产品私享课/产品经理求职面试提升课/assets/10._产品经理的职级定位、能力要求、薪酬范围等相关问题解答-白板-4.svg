<rect x="-92" y="-18" width="184" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他问题记录和回答</text><path d="M92,0 C182,0 182,-360 272,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-375" width="266.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="313.38" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">问题1：海外品牌分销系统这个方向怎么样</text><path d="M446.76,-360 C403.38,-360 403.38,-360 360,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-375" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">回答</text><path d="M440,-360 C490,-360 490,-380 540,-380" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-395" width="442.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="761.26" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.拆解一下这个赛道或者工作，需要具备什么能力，能够掌握哪些东西？</text><path d="M440,-360 C490,-360 490,-340 540,-340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-355" width="403.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="741.76" y="-335" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.这些关键词和信息，是否可以和其他岗位，其他赛道的机会匹配</text><path d="M92,0 C182,0 182,-200 272,-200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-215" width="385.84" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="372.91999999999996" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">问题2：2024年就业环境和2023比会更好，还是更难，讨论一下</text><path d="M565.8399999999999,-200 C462.91999999999996,-200 462.91999999999996,-200 360,-200" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-215" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">回答</text><path d="M440,-200 C490,-200 490,-260 540,-260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-275" width="221.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="650.76" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.产品经理这个赛道来说，会更难</text><path d="M761.52,-260 C740.76,-260 740.76,-300 720,-300" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-315" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">新人涌入</text><path d="M761.52,-260 C740.76,-260 740.76,-260 720,-260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-275" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">老人裁员</text><path d="M761.52,-260 C740.76,-260 740.76,-220 720,-220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-235" width="136.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="788.38" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">新机会/新岗位不多</text><path d="M440,-200 C490,-200 490,-140 540,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-155" width="208.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="644.26" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.整体行业的情况来说，是好事</text><path d="M748.52,-140 C734.26,-140 734.26,-180 720,-180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-195" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="791.5" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">劝退一些不合适的人</text><path d="M748.52,-140 C734.26,-140 734.26,-140 720,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-155" width="214.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="827.38" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">淘汰机制/筛选一些合适的人留下</text><path d="M748.52,-140 C734.26,-140 734.26,-100 720,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-115" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">城市分流</text><path d="M92,0 C182,0 182,-20 272,-20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-35" width="547.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="453.52" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">问题3：从0-1去学习一个新行业，多长时间才觉得自己入行，去学习的过程中有什么好建议</text><path d="M727.04,-20 C543.52,-20 543.52,-20 360,-20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-35" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">回答</text><path d="M440,-20 C490,-20 490,-60 540,-60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-75" width="156.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="618.26" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.入行这个定义很难说</text><path d="M440,-20 C490,-20 490,-20 540,-20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-35" width="404.55999999999995" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="742.28" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.“从事上练，向高人学”，入行、入门、看山不是山-&gt;看山还是山</text><path d="M440,-20 C490,-20 490,20 540,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="5" width="488.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="784.14" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.搜索优质的资料，复刻/临摹，高频地练习并实践，慢就是快，动手能力很关键</text><path d="M1028.28,20 C874.14,20 874.14,20 720,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="720" y="5" width="117.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="778.76" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">输入→训练→输出</text><path d="M92,0 C182,0 182,60 272,60" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="45" width="292.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="326.38" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">问题4：简历上怎么写项目，去投递心怡的岗位</text><path d="M472.76,60 C416.38,60 416.38,60 360,60" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="45" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">回答</text><path d="M440,60 C490,60 490,60 540,60" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="45" width="326.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="703.02" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.关注“匹配”两个字，简历上要多写电商相关的东西</text><path d="M92,0 C182,0 182,120 272,120" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="105" width="565.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="462.88" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">问题5：刚转供应链赛道，应该注重业务场景的学习和思考方案，还是注重竞品系统功能设计呢</text><path d="M745.76,120 C552.88,120 552.88,120 360,120" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="105" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">回答</text><path d="M440,120 C490,120 490,100 540,100" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="85" width="299.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="689.76" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.如果是工作需要输出什么的东西，先关注竞品</text><path d="M440,120 C490,120 490,140 540,140" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="125" width="507.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="793.76" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.如果工作上的要求不那么紧急，优先考虑业务场景的梳理，还是要结合竞品来设计</text><path d="M92,0 C182,0 182,220 272,220" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="205" width="364.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="362.26" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">问题6：作为一个i人，如何去规避在产品经理工作的局限性</text><path d="M544.52,220 C452.26,220 452.26,220 360,220" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="205" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">回答</text><path d="M440,220 C490,220 490,180 540,180" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="165" width="221.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="650.76" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.产品经理不适合太内向的人去做</text><path d="M440,220 C490,220 490,220 540,220" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="205" width="234.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657.26" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.沟通，冲突，对外频繁，强大内心</text><path d="M440,220 C490,220 490,260 540,260" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="245" width="182.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="631.26" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.脸皮要厚，心理素质要强</text><path d="M92,0 C182,0 182,340 272,340" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="180" y="325" width="539.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="449.88" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">问题7：面试中，碰到很极端的场景题，没有准备或者之前没涉及很深入，应该怎么回答好</text><path d="M719.76,340 C539.88,340 539.88,340 360,340" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="325" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">回答</text><path d="M440,340 C490,340 490,300 540,300" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="285" width="156.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="618.26" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.回答不出来，很正常</text><path d="M440,340 C490,340 490,360 540,360" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="345" width="169.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="624.76" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.复盘，学习，恶补知识</text><path d="M709.52,360 C714.76,360 714.76,340 720,340" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="325" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">先练手</text><path d="M709.52,360 C714.76,360 714.76,380 720,380" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="365" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="785" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">再投递心怡的岗位</text>
</svg>