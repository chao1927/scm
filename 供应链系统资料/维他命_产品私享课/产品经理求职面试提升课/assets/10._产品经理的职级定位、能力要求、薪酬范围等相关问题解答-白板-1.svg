<defs></defs>
<rect x="-172.16" y="-599" width="1474.68" height="1198" fill="#fff"/>
<rect x="-88.16" y="-18" width="176.32" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">职级定位/能力要求</text><path d="M88.16,0 C178.15999999999997,0 178.15999999999997,-380 268.15999999999997,-380" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="180" y="-395" width="149.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="254.88" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">常见/常听的一些问题</text><path d="M329.76,-380 C344.88,-380 344.88,-500 360,-500" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="-515" width="228.8" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="474.4" y="-495" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品经理的Title定级是怎么样的？</text><path d="M329.76,-380 C344.88,-380 344.88,-460 360,-460" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="-475" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="503" y="-455" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">初、中、高级产品经理要分别达到哪些要求？</text><path d="M329.76,-380 C344.88,-380 344.88,-420 360,-420" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="-435" width="254.27999999999997" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="487.14" y="-415" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">具备怎么样的能力才能去面试XXX公司？</text><path d="M329.76,-380 C344.88,-380 344.88,-380 360,-380" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="-395" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="516" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">我当前是属于怎么样的能力？我怎么判断和评价？</text><path d="M329.76,-380 C344.88,-380 344.88,-340 360,-340" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="-355" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="490" y="-335" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有哪些能力是必须的？哪些是非必须的？</text><path d="M329.76,-380 C344.88,-380 344.88,-300 360,-300" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="-315" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="503" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">深度和广度的知识该怎么选择？要多懂业务？</text><path d="M329.76,-380 C344.88,-380 344.88,-260 360,-260" fill="none" stroke="#69B1E4" stroke-width="2"/><rect x="360" y="-275" width="299" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="509.5" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">什么是产品基本功，怎么样才是是基本功扎实？</text><path d="M88.16,0 C178.15999999999997,0 178.15999999999997,140 268.15999999999997,140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="125" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">我的一些观察和解答</text><path d="M323,140 C341.5,140 341.5,-160 360,-160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-175" width="528.3199999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="624.16" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.Title，职级，标签等，一般来说只有大厂的有参考价值，其他的基本上都没什么价值</text><path d="M888.3199999999999,-160 C714.16,-160 714.16,-220 540,-220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-235" width="114.66" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="597.33" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">阿里：P6 P7 P8</text><path d="M888.3199999999999,-160 C714.16,-160 714.16,-180 540,-180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-195" width="159.77" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="619.885" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">字节：2-1 2-2 3-1 3-2</text><path d="M888.3199999999999,-160 C714.16,-160 714.16,-140 540,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-155" width="105.69" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="592.845" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">腾讯：6 7 8 9</text><path d="M888.3199999999999,-160 C714.16,-160 714.16,-100 540,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-115" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">参考链接</text><path d="M620,-100 C670,-100 670,-100 720,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-115" width="167.96" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="803.98" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">https://duibiao.info/</text><path d="M323,140 C341.5,140 341.5,-60 360,-60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-75" width="858.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="789.26" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.非大厂的职级没参考价值，所以对应的能力要求也是没什么参考价值，所以无需纠结，初中高级应该具备什么能力，这个不同公司有不同的要求</text><path d="M323,140 C341.5,140 341.5,20 360,20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="5" width="494.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="607.26" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.面试关注的是一个匹配度的问题，不一定说要能力非常突出才能去面试某个公司</text><path d="M854.52,20 C697.26,20 697.26,-20 540,-20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-35" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="624.5" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">合适的时机（刚好缺人）</text><path d="M854.52,20 C697.26,20 697.26,20 540,20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="5" width="253.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="666.88" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">匹配的点（过往经历/某些技能的匹配）</text><path d="M854.52,20 C697.26,20 697.26,60 540,60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="45" width="260.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="670.26" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他因素（价值观/理念/合作互利互惠）</text><path d="M323,140 C341.5,140 341.5,240 360,240" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="225" width="494.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="607.26" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.产品经理要具备什么能力，要具备什么知识，这个要看行业，公司，业务方向等</text><path d="M854.52,240 C697.26,240 697.26,160 540,160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="145" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">基本能力是通用的，这个可以先掌握</text><path d="M774,160 C747,160 747,100 720,100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="85" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">学习能力</text><path d="M774,160 C747,160 747,140 720,140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="125" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">办公技能</text><path d="M774,160 C747,160 747,180 720,180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="165" width="110.75999999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="775.38" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">沟通/表达能力</text><path d="M774,160 C747,160 747,220 720,220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="205" width="97.75999999999999" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="768.88" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">兴趣/意愿度</text><path d="M854.52,240 C697.26,240 697.26,280 540,280" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="265" width="403" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="741.5" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有一些能力是可以迁移的，先打好一些基础，转到其他方向也容易</text><path d="M943,280 C831.5,280 831.5,260 720,260" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="245" width="117.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="778.76" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">进销存-&gt;供应链</text><path d="M943,280 C831.5,280 831.5,300 720,300" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="285" width="183.04000000000002" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="811.52" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">业务-&gt;财务-&gt;业财税一体化</text><path d="M854.52,240 C697.26,240 697.26,360 540,360" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="345" width="319.79999999999995" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="699.9" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">基于腾讯的产品经理能力模型输出的一个Level参考</text><path d="M859.8,360 C789.9,360 789.9,340 720,340" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="325" width="391.03999999999974" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="915.5199999999999" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">https://www.yuque.com/jiaowovitamin/uizu4s/ielt8z#6edd</text><path d="M859.8,360 C789.9,360 789.9,380 720,380" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="365" width="424.8399999999997" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="932.4199999999998" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">https://www.yuque.com/jiaowovitamin/uizu4s/tqec79dvnkhmmnmt</text><path d="M323,140 C341.5,140 341.5,460 360,460" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="445" width="624.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="672.26" y="465" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">5.产品基本功也是一个很宽泛的概念，可以称之为底层能力，即各行业的产品经理基本上都要用到的能力</text><path d="M984.52,460 C762.26,460 762.26,420 540,420" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="405" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="676.5" y="425" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">需求分析，竞品分析，业务设计，应用设计</text><path d="M984.52,460 C762.26,460 762.26,460 540,460" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="445" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="465" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">沟通，表达，文档输出，工具的使用</text><path d="M984.52,460 C762.26,460 762.26,500 540,500" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="485" width="331.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="705.88" y="505" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品定位，宏观视角，产品用户画像/业务场景梳理等</text>
</svg>