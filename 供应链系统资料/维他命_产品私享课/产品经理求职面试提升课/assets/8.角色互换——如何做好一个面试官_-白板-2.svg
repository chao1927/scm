<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-168 -539 1442 1078" width="1442" height="1078"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-168" y="-539" width="1442" height="1078" fill="#fff"/>
<rect x="-84" y="-18" width="168" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试官如何筛选人</text><path d="M84,0 C174,0 174,-200 264,-200" fill="none" stroke="#E48484" stroke-width="2"/><rect x="180" y="-215" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="264.5" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试选人的一些核心思想</text><path d="M349,-200 C354.5,-200 354.5,-420 360,-420" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-435" width="182.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="451.26" y="-415" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.匹配度的优先级高于一切</text><path d="M542.52,-420 C541.26,-420 541.26,-440 540,-440" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-455" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="683" y="-435" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">能力强不一定匹配，能力弱不一定就不能培养</text><path d="M542.52,-420 C541.26,-420 541.26,-400 540,-400" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="-415" width="507" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="793.5" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">核心还是要看：是否匹配，是不是同一类人，是不是有潜力，是不是适合当前的团队</text><path d="M349,-200 C354.5,-200 354.5,-220 360,-220" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-235" width="325.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="522.76" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.不同经验和不同阅历的人应该用不同的要求去看待</text><path d="M685.52,-220 C612.76,-220 612.76,-300 540,-300" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="-315" width="104.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="592.26" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.初中级产品</text><path d="M644.52,-300 C682.26,-300 682.26,-360 720,-360" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-375" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="778.5" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注当前的能力</text><path d="M644.52,-300 C682.26,-300 682.26,-320 720,-320" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-335" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="778.5" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注未来的潜力</text><path d="M644.52,-300 C682.26,-300 682.26,-280 720,-280" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-295" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="824" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注态度和志向，对产品的热情</text><path d="M644.52,-300 C682.26,-300 682.26,-240 720,-240" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-255" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="798" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注自驱力和学习意愿</text><path d="M685.52,-220 C612.76,-220 612.76,-140 540,-140" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="-155" width="104.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="592.26" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.中高级产品</text><path d="M644.52,-140 C682.26,-140 682.26,-200 720,-200" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-215" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="804.5" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注是否能直接上手干活</text><path d="M644.52,-140 C682.26,-140 682.26,-160 720,-160" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-175" width="299" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="869.5" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注对竞品，产品商业场景，市场动态上的理解</text><path d="M644.52,-140 C682.26,-140 682.26,-120 720,-120" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-135" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="863" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注业务知识是否扎实、产品基本功是否扎实</text><path d="M644.52,-140 C682.26,-140 682.26,-80 720,-80" fill="none" stroke="#E48484" stroke-width="2"/><rect x="720" y="-95" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="863" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注对产品岗位的认知，产品思维方面的表现</text><path d="M349,-200 C354.5,-200 354.5,0 360,0" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-15" width="195.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="457.76" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.统筹多轮面试官的综合意见</text><path d="M555.52,0 C547.76,0 547.76,-40 540,-40" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="-55" width="182" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="631" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试过程中看走眼是正常的</text><path d="M555.52,0 C547.76,0 547.76,0 540,0" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="-15" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="709" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不同面试官对候选人的要求不一样，需要综合多方意见</text><path d="M555.52,0 C547.76,0 547.76,40 540,40" fill="none" stroke="#E48484" stroke-width="2"/><rect x="540" y="25" width="364" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="722" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试不能完全发挥候选人的能力，也不能很全面的了解对方</text><path d="M84,0 C174,0 174,260 264,260" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="180" y="245" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="238.5" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">决策的一些流程</text><path d="M297,260 C328.5,260 328.5,120 360,120" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="105" width="208.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="464.26" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.明确岗位职责和候选人的要求</text><path d="M568.52,120 C554.26,120 554.26,80 540,80" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="65" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="644" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">进来后做什么？负责什么内容？</text><path d="M568.52,120 C554.26,120 554.26,120 540,120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="105" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="670" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">要几年的工作经验？要什么方向的经验？</text><path d="M568.52,120 C554.26,120 554.26,160 540,160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="145" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="709" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">哪些是必须要求的，哪些是可以放宽的？哪些是加分的</text><path d="M297,260 C328.5,260 328.5,260 360,260" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="245" width="221.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="470.76" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.根据面试记录表进行打分和反馈</text><path d="M581.52,260 C560.76,260 560.76,200 540,200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="185" width="390" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="735" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试过程中，提了什么问题，对方回答的怎么样的，表现的如何</text><path d="M581.52,260 C560.76,260 560.76,240 540,240" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="225" width="416" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="748" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试过程中体现出的优势是什么，劣势是什么，综合能力是怎么样的</text><path d="M581.52,260 C560.76,260 560.76,280 540,280" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="265" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="715.5" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试过程中和团队匹配的点是什么？不匹配的点是什么？</text><path d="M581.52,260 C560.76,260 560.76,320 540,320" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="305" width="377" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="728.5" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">你看中的点是什么？觉得不满意，可能会有隐患的点是什么？</text><path d="M297,260 C328.5,260 328.5,400 360,400" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="385" width="247.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="483.76" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.结合未来的潜力和稳定性等综合考虑</text><path d="M607.52,400 C573.76,400 573.76,360 540,360" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="345" width="468" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="774" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有些人可能比较优秀，和团队也比较吻合，但是稳定性不足也会影响录取几率</text><path d="M607.52,400 C573.76,400 573.76,400 540,400" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="385" width="637" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="858.5" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">有些人当前经验可能已经充足了，但是可能未来的潜力或者更上一层的机会不多，那么可能也会影响到录用</text><path d="M607.52,400 C573.76,400 573.76,440 540,440" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="425" width="650" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="865" y="445" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">决策过程中会有一些感性的部分，也会有一些理性的部分，总体来说还是要告诫自己，理性的部分占多数一些</text>
</svg>