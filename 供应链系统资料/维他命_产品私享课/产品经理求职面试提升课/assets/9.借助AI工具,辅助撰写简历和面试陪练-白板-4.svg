<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-136 -459 2143.0699999999997 918" width="2143.0699999999997" height="918"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-136" y="-459" width="2143.0699999999997" height="918" fill="#fff"/>
<rect x="-52" y="-18" width="104" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">补充内容</text><path d="M52,0 C142,0 142,-180 232,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-195" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">聊聊最近的求职情况</text><path d="M323,-180 C341.5,-180 341.5,-320 360,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-335" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="418.5" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">金三银四的行情</text><path d="M477,-320 C508.5,-320 508.5,-360 540,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-375" width="1383.07" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1231.5349999999999" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1. 金三银四更多的是指在这个月份，会出现很多人员流动，市面上招聘的岗位增加了，于是大家会看到很多公司在招人。但是这个不等同于说市面上新增的岗位缺口多了，用人的需求多了，大多数还是因为人员流动而产生的补位和替换；</text><path d="M477,-320 C508.5,-320 508.5,-320 540,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-335" width="1253.59" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1166.795" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2. 虽然市面上的岗位看起来多了一些，但是背后求职投递简历的竞争者也多了，“一个产品经理岗位放出去，一天能接到几百份简历”的事情真实的发生在我的身边，此时的竞争难度并没有因为金三银四而有所缩减；</text><path d="M477,-320 C508.5,-320 508.5,-280 540,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-295" width="1175.59" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1127.795" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3. 金三银四加快了招聘的节奏，同时也拔高了选人的要求。当一个岗位一天收到了几百份简历之后，HR和用人部门在筛选简历的时候会用极其严苛的要求和标准去过滤，确保最后剩下的简历是精简的；</text><path d="M323,-180 C341.5,-180 341.5,-180 360,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-195" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="418.5" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">怎么看待外包？</text><path d="M477,-180 C508.5,-180 508.5,-240 540,-240" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-255" width="611.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="845.76" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.外包的省成本的最佳方式，未来经济下行或者是盈利有限的情况会更多，也就意味着外包会成为主流</text><path d="M477,-180 C508.5,-180 508.5,-200 540,-200" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-215" width="780.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="930.26" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.对互联网外包的固有印象和偏见，主要来源于前些年互联网大厂的快速增长，大家发现有能力的去了正编岗，能力差的去了外包岗</text><path d="M477,-180 C508.5,-180 508.5,-160 540,-160" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-175" width="780.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="930.26" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.未来外包的门槛也会越来越高，互联网岗位已经逐步成熟了，混子越来越难混，白刃战是常态化，所以外包岗也不一定那么好进了</text><path d="M477,-180 C508.5,-180 508.5,-120 540,-120" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-135" width="546.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="813.26" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.先生存，再生活，没有岗位，没有工作的时候，外包也不是不能选择，没有想象中那么差</text><path d="M323,-180 C341.5,-180 341.5,-40 360,-40" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-55" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="412" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">怎么看待降薪</text><path d="M464,-40 C502,-40 502,-80 540,-80" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-95" width="468.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="774.26" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.未来平薪或者降薪跳槽可能都是常态了，主要原因还是岗位机会少，竞争大</text><path d="M464,-40 C502,-40 502,-40 540,-40" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-55" width="508.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="794.02" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.目前在职的朋友，没有特别难熬的情况，都建议继续苟住，稳稳拿下12个月的薪资</text><path d="M464,-40 C502,-40 502,0 540,0" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-15" width="377.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="728.76" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.经济会有周期，行业也会有周期，要能学会亏，才能学会赚</text><path d="M52,0 C142,0 142,100 232,100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="85" width="221" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="290.5" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">怎么提升自己的产品求职通过率？</text><path d="M401,100 C380.5,100 380.5,60 360,60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="45" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="444.5" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">敢于尝试，不对自我设限</text><path d="M529,60 C534.5,60 534.5,40 540,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="25" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="644" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">各个城市，各个方向都可以投递</text><path d="M529,60 C534.5,60 534.5,80 540,80" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="65" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="670" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不要被薪资，还有年限，岗位要求等限制</text><path d="M401,100 C380.5,100 380.5,120 360,120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="105" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="418.5" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">先完成，再完美</text><path d="M477,120 C508.5,120 508.5,120 540,120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="105" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">可以先做踏板型的工作，留在牌桌上</text><path d="M401,100 C380.5,100 380.5,160 360,160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="145" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="431.5" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">持续学习，多做少想</text><path d="M52,0 C142,0 142,280 232,280" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="265" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="264.5" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">逐步提升自己的职场认知</text><path d="M349,280 C354.5,280 354.5,200 360,200" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="185" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="496.5" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">没能力的领导为什么能持续在那个位置上？</text><path d="M349,280 C354.5,280 354.5,240 360,240" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="225" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="457.5" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">我为什么薪资总是涨不上去？</text><path d="M555,240 C547.5,240 547.5,240 540,240" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="225" width="377" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="728.5" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果你不是心腹，没有特别看重，那么跳槽是加薪的最好方式</text><path d="M349,280 C354.5,280 354.5,320 360,320" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="305" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="516" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">公司福利缩减了，我感觉会裁员，很焦虑怎么办？</text><path d="M672,320 C606,320 606,280 540,280" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="265" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="585.5" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">二极管思维</text><path d="M672,320 C606,320 606,340 540,340" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="325" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="598.5" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">关注圈和影响圈</text><path d="M657,340 C688.5,340 688.5,320 720,320" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="720" y="305" width="247" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="843.5" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">国家大事，政策，各种虚无缥缈的东西</text><path d="M657,340 C688.5,340 688.5,360 720,360" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="720" y="345" width="247" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="843.5" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">你能左右的，你能控制的，你能影响的</text>
</svg>