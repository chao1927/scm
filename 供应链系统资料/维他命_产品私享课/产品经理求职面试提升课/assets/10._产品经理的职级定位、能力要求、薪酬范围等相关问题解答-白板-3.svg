cSystemFont,sans-serif">To G方向的产品都很坑吗？应该要去做吗？</text><path d="M329.76,-400 C344.88,-400 344.88,-320 360,-320" fill="none" stroke="#E48484" stroke-width="2"/><rect x="360" y="-335" width="195" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="457.5" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应链产品经理方向怎么样？</text><path d="M104.16,0 C194.15999999999997,0 194.15999999999997,100 284.15999999999997,100" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="180" y="85" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">我的一些观察和解答</text><path d="M323,100 C341.5,100 341.5,-140 360,-140" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="-155" width="351.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="535.76" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.对于刚毕业的新人来说，选对行业确实是少走很多弯路</text><path d="M711.52,-140 C625.76,-140 625.76,-280 540,-280" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="-295" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="605" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">优先考虑一线城市</text><path d="M711.52,-140 C625.76,-140 625.76,-140 540,-140" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="-155" width="325" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="702.5" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">优先考虑目前正火热的行业和赛道，不要想着捞偏门</text><path d="M865,-140 C792.5,-140 792.5,-240 720,-240" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="-255" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">SaaS</text><path d="M865,-140 C792.5,-140 792.5,-200 720,-200" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="-215" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">电商</text><path d="M865,-140 C792.5,-140 792.5,-160 720,-160" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="-175" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">财务</text><path d="M865,-140 C792.5,-140 792.5,-120 720,-120" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="-135" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应链</text><path d="M865,-140 C792.5,-140 792.5,-80 720,-80" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="-95" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">AI</text><path d="M865,-140 C792.5,-140 792.5,-40 720,-40" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="720" y="-55" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="760" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">新能源</text><path d="M711.52,-140 C625.76,-140 625.76,0 540,0" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="-15" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="715.5" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">优先考虑赛道宽广，未来有机会跳槽，有更多选择的行业</text><path d="M323,100 C341.5,100 341.5,80 360,80" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="65" width="676.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="698.26" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.对于已经工作了一段时间的人来说，多关注行业的变化，多关注自身所处领域的一些趋势和近况，提前最好规划</text><path d="M1036.52,80 C788.26,80 788.26,40 540,40" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="25" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="709" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">内部有机会转岗或者多接触其他领域，就要多提前准备</text><path d="M1036.52,80 C788.26,80 788.26,80 540,80" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="65" width="325" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="702.5" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">每隔一段时间要跳出去看看，尝试突破自己的舒适圈</text><path d="M1036.52,80 C788.26,80 788.26,120 540,120" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="105" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">多和外部的朋友交流，不要封闭信息</text><path d="M323,100 C341.5,100 341.5,280 360,280" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="265" width="657.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="688.64" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.什么行业/什么赛道会更有机会，更有前景，这个是很难摸得准的，我们需要的是关注一些大趋势下的小波浪</text><path d="M1017.28,280 C778.64,280 778.64,160 540,160" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="540" y="145" width="157.04000000000002" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="618.52" 