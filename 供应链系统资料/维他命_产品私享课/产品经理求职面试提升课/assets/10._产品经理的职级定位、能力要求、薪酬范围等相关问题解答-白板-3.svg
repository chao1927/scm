 height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="624.5" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">融资情况，公司扩张情况</text><path d="M323,100 C341.5,100 341.5,440 360,440" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="425" width="559.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="639.76" y="445" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.职业发展需要动态调整，如果不合适的，不想做的，就要尽快跳出来，而不是一直消耗自己</text><path d="M323,100 C341.5,100 341.5,480 360,480" fill="none" stroke="#E482D4" stroke-width="2"/><rect x="360" y="465" width="780.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="750.26" y="485" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">5.合适的公司，合适的团队下，那么就要尽量吃透业务，掌握一些差异化的信息和经验，后续跳槽的时候这个就是自己的稀缺性价值</text>
