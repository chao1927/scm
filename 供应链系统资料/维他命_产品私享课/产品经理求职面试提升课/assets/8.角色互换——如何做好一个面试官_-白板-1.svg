<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-168 -439 1816.84 878" width="1816.84" height="878"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-168" y="-439" width="1816.84" height="878" fill="#fff"/>
<rect x="-84" y="-18" width="168" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试官的待办事项</text><path d="M84,0 C174,0 174,-280 264,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-295" width="260.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="310.26" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.明确岗位职责，定义清晰的候选人画像</text><path d="M440.52,-280 C400.26,-280 400.26,-340 360,-340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-355" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="496.5" y="-335" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这个岗位需要什么技能？需要怎么样的人？</text><path d="M440.52,-280 C400.26,-280 400.26,-300 360,-300" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-315" width="364" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="542" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">当前的团队中适合怎么样的人？有哪些点是要重点考虑的？</text><path d="M440.52,-280 C400.26,-280 400.26,-260 360,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-275" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="529" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">这个人需要具备什么特质？哪些特质是必须要具备的？</text><path d="M440.52,-280 C400.26,-280 400.26,-220 360,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-235" width="429" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="574.5" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">自己的选人标准，打分逻辑是怎么样的？怎么客观地挖掘到匹配的人？</text><path d="M84,0 C174,0 174,-140 264,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-155" width="260.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="310.26" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.准备面试题，从不同维度去考察候选人</text><path d="M440.52,-140 C400.26,-140 400.26,-180 360,-180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-195" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="529" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试的时候要重点考察对方什么特质，要问什么问题？</text><path d="M440.52,-140 C400.26,-140 400.26,-140 360,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-155" width="364" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="542" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">列出自己对候选人的一些要求和期待，想清楚自己要什么人</text><path d="M440.52,-140 C400.26,-140 400.26,-100 360,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-115" width="572" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="646" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">准备好一套面试题库，分别针对初中高级的产品经理，这样在提问的时候会更加有条理和逻辑性</text><path d="M84,0 C174,0 174,0 264,0" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="-15" width="273.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="316.76" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.提前阅读简历，发掘候选人的亮点和短板</text><path d="M453.52,0 C406.76,0 406.76,-60 360,-60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-75" width="390" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="555" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">先从全局阅读，看简历样式，布局和一些关键信息是否传递到位</text><path d="M453.52,0 C406.76,0 406.76,-20 360,-20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-35" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="496.5" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">再看公司和项目模块，了解一些过往的背景</text><path d="M453.52,0 C406.76,0 406.76,40 360,40" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="25" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="535.5" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">最后看相关的细节，确认是否有匹配的点，然后邀约面试</text><path d="M711,40 C625.5,40 625.5,20 540,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="5" width="325" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="702.5" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历不能有明显错误，低级错误，这样的简历会扣分</text><path d="M711,40 C625.5,40 625.5,60 540,60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="45" width="345.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="712.64" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">能快速get到候选人的亮点，特质，是能让人感觉匹配的</text><path d="M84,0 C174,0 174,160 264,160" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="145" width="208.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="284.26" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.面试开始时先主动做自我介绍</text><path d="M388.52,160 C374.26,160 374.26,140 360,140" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="125" width="455" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="587.5" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不要一开始就让面试者做自我介绍，而是要先打招呼，让对方放松，不紧张</text><path d="M815,140 C677.5,140 677.5,100 540,100" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="85" width="182" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="631" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">先称呼对方名字，确认身份</text><path d="M815,140 C677.5,140 677.5,140 540,140" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="125" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">再询问一些天气，路程等信息</text><path d="M815,140 C677.5,140 677.5,180 540,180" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="165" width="273" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="676.5" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">最后再做个简单的自我介绍后就可以开始了</text><path d="M388.52,160 C374.26,160 374.26,220 360,220" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="205" width="1204.84" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="962.42" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">我叫XXX，是本次的面试官，在公司里负责XXX，我们目前正在招聘XXX的产品经理，看完了你的简历之后感觉有一些点还是比较匹配的，所以就特意邀请你来参加面试，如果你准备好了，那我们就可以开始了</text><path d="M84,0 C174,0 174,300 264,300" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="285" width="312.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="336.26" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">5.面试过程中要做面试记录，面试后要做综合点评</text><path d="M492.52,300 C426.26,300 426.26,260 360,260" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="245" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="457.5" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试中提的问，候选人的回答</text><path d="M492.52,300 C426.26,300 426.26,300 360,300" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="285" width="260" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="490" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客观记录候选人对某个事情的观点和看法</text><path d="M492.52,300 C426.26,300 426.26,340 360,340" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="325" width="338" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="529" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试结束后，把候选人的优势，劣势，综合评价都记录</text><path d="M698,340 C619,340 619,340 540,340" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="325" width="208.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="644.26" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">后续二面或者HR会需要知道细节</text>
</svg>