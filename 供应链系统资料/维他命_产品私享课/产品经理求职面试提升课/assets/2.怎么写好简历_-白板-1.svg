<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-160 -592 2460.899999999999 1148" width="2460.899999999999" height="1148"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-160" y="-592" width="2460.899999999999" height="1148" fill="#fff"/>
<rect x="-76" y="-18" width="152" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">产品经理的简历</text><path d="M76,0 C166,0 166,-280 256,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-295" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="238.5" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历的几大模块</text><path d="M297,-280 C328.5,-280 328.5,-380 360,-380" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-395" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">基本信息</text><path d="M440,-380 C490,-380 490,-380 540,-380" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-395" width="299" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="689.5" y="-375" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">介绍自己的姓名，年龄，工作时长，联系方式等</text><path d="M297,-280 C328.5,-280 328.5,-340 360,-340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-355" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-335" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">自我评价</text><path d="M440,-340 C490,-340 490,-340 540,-340" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-355" width="403" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="741.5" y="-335" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对自己做一个简单的评价和介绍，可以让面试官在短时间内记住你</text><path d="M297,-280 C328.5,-280 328.5,-300 360,-300" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-315" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">工作经历</text><path d="M440,-300 C490,-300 490,-300 540,-300" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-315" width="416" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="748" y="-295" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">就职过什么公司，什么岗位，待了多久的时间，这个公司是做什么的</text><path d="M297,-280 C328.5,-280 328.5,-260 360,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-275" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">项目经历</text><path d="M440,-260 C490,-260 490,-260 540,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-275" width="481" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="780.5" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">做过什么项目，项目的背景是什么，你的任务和行动是什么，最后的结果是什么</text><path d="M297,-280 C328.5,-280 328.5,-220 360,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-235" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">教育经历</text><path d="M440,-220 C490,-220 490,-220 540,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-235" width="325" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="702.5" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">应届生可以把教育经历放前面，社招则放在后面即可</text><path d="M297,-280 C328.5,-280 328.5,-180 360,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-195" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他信息</text><path d="M440,-180 C490,-180 490,-180 540,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-195" width="403" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="741.5" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">自己考过的证书，拿过的奖项，或者自己有什么作品也可以放上去</text><path d="M76,0 C166,0 166,40 256,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="25" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="251.5" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历编写的一些原则</text><path d="M323,40 C341.5,40 341.5,-120 360,-120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-135" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">相关性</text><path d="M440,-120 C490,-120 490,-140 540,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-155" width="247" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="663.5" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">和招聘的岗位和内容是匹配的，相关的</text><path d="M440,-120 C490,-120 490,-100 540,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-115" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="715.5" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历上无关的项目，不太匹配的内容要删掉或者缩小占比</text><path d="M323,40 C341.5,40 341.5,-40 360,-40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-55" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简洁性</text><path d="M440,-40 C490,-40 490,-60 540,-60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-75" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="683" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">排版要简洁，视觉上阅读起来的时候是简洁的</text><path d="M440,-40 C490,-40 490,-20 540,-20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-35" width="416" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="748" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">文字描述要简洁，不要写长句，不要写太多标点符号等，不利于阅读</text><path d="M323,40 C341.5,40 341.5,40 360,40" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="25" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">客观性</text><path d="M440,40 C490,40 490,20 540,20" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="5" width="475.79999999999995" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="777.9" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">可以适当美化包装，但是不要吹嘘的过大，精通，熟练，Cover等词语要拿捏住</text><path d="M440,40 C490,40 490,60 540,60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="45" width="533" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="806.5" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">从客观角度去评价自己的工作经历和成就，多使用一些事例和数据化的表达来增强信服力</text><path d="M323,40 C341.5,40 341.5,160 360,160" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="145" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">结果导向性</text><path d="M451,160 C495.5,160 495.5,100 540,100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="85" width="286" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="683" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">侧重点在写自己的结果，而不是写太多的执行</text><path d="M451,160 C495.5,160 495.5,180 540,180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="165" width="318.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="699.38" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">用数据化表达+行为词的方式体现自己的能力和成绩</text><path d="M858.76,180 C789.38,180 789.38,140 720,140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="125" width="104" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="772" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">常用的行为词</text><path d="M824,140 C862,140 862,140 900,140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="900" y="125" width="1316.8999999999992" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1558.4499999999996" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">参与 编辑 校订 使用 处理 行使 查阅 实现 采购提供 供应完成 提交 汇报 支持 记录 辅助 保持 促进 阐述 担任 解释参加 生产 销售 出售 执行 演示 宣传 反馈 发布 展示 介绍出版 调试 测试 试验 报告 翻译 编写 计算 操作 修理</text><path d="M858.76,180 C789.38,180 789.38,180 720,180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="165" width="143" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="791.5" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">个人成就类的行为词</text><path d="M863,180 C881.5,180 881.5,180 900,180" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="900" y="165" width="889.1999999999997" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1344.6" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">加快 荻得 实现 得到 赢取 加速 降低 扩大 拓展改善 改进重构 创建 升级 完成 影响 增加 减少 掌握 完善 重塑 简化扩张提升 覆盖 加强 修复 重建 搭建</text><path d="M858.76,180 C789.38,180 789.38,220 720,220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="205" width="143" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="791.5" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">表现领导力的行为词</text><path d="M863,220 C881.5,220 881.5,220 900,220" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="900" y="205" width="631.1500000000001" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1215.575" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">负责 召集 指挥组建 构建 任命 主导主持组织制定 带领领导 牵头 监督 监管 核查 决定 引导挑选 调解影响</text><path d="M76,0 C166,0 166,320 256,320" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="305" width="169" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="264.5" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">其他一些需要注意的细节</text><path d="M349,320 C354.5,320 354.5,260 360,260" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="245" width="377.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="548.76" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.经历倒叙陈述，由近及远的方式展示过往的公司和项目经历</text><path d="M349,320 C354.5,320 354.5,300 360,300" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="285" width="390.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="555.26" y="305" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.排版布局的一些留白间距要得体，不要太密集，也不要太松散</text><path d="M349,320 C354.5,320 354.5,340 360,340" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="325" width="221.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="470.76" y="345" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.标点符号很重要，不要乱用标点</text><path d="M349,320 C354.5,320 354.5,380 360,380" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="365" width="286.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="503.26" y="385" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.不要有错别字，关键信息可以加粗，标签化</text>
</svg>