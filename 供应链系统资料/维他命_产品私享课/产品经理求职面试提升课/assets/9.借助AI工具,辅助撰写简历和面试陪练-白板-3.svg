<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-160 -359 5829.040000000004 718" width="5829.040000000004" height="718"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-160" y="-359" width="5829.040000000004" height="718" fill="#fff"/>
<rect x="-76" y="-18" width="152" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">模拟面试和回答</text><path d="M76,0 C166,0 166,-220 256,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-235" width="130.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245.26" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">AI扮演产品面试官</text><path d="M310.52,-220 C335.26,-220 335.26,-240 360,-240" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-255" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,-240 C490,-240 490,-260 540,-260" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-275" width="547.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="813.52" y="-255" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.让AI扮演产品面试官，逐条向你提问，你可以了解产品面试的时候可能对方会问你什么？</text><path d="M440,-240 C490,-240 490,-220 540,-220" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-235" width="482.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="781.02" y="-215" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.让AI扮演面试官，同时做到自问自答，知道他会问什么的同时也看看他的回答</text><path d="M310.52,-220 C335.26,-220 335.26,-180 360,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-195" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">参考提示词</text><path d="M451,-180 C495.5,-180 495.5,-180 540,-180" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-195" width="5045.040000000004" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="3062.520000000002" y="-175" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">我希望你充当一个资深的供应链方向的产品经理面试官，有非常丰富的供应链产品系统的功能设计经验，熟悉供应链中多个系统，包括但不限于OMS，WMS，ERP，库存，计划，采购，需求计划等各领域的业务知识和产品设计。我现在要参与供应链系统（WMS/ERP/OMS/库存）方向的产品经理面试，请你充当我的模拟面试官，你需要不断地提出一些产品经理的面试问题给我，直到我回复“结束面试”。每次给我只提一个问题，然后几秒后我会给你回复“1”表示我已经回答了这个问题，此时你需要给出你认可的参考答案，随后才在下一段继续提出下一个问题。## 注意：- 只有在用户开始提问的时候你才开始回答，用户不提问时，请不要回答- 面试题希望是可以围绕供应链的实际业务场景，业务流程，产品解决方案，产品思维，产品认知，系统功能涉及，系统实现方案等，进行随机性的提问## 初始语句&quot;嗨，我是一个资深的供应链产品面试官，现在我们可以准备开始面试了。&quot;</text><path d="M76,0 C166,0 166,-100 256,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="180" y="-115" width="130.51999999999998" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245.26" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">AI扮演产品求职者</text><path d="M310.52,-100 C335.26,-100 335.26,-120 360,-120" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-135" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,-120 C490,-120 490,-140 540,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-155" width="391.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="735.52" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.让AI扮演一个求职者，你来给他提出问题，然后让他进行回答</text><path d="M931.04,-140 C825.52,-140 825.52,-140 720,-140" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="720" y="-155" width="424.8399999999997" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="932.4199999999998" y="-135" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">https://www.yuque.com/jiaowovitamin/uizu4s/pxwzrbkgxcyznp20</text><path d="M440,-120 C490,-120 490,-100 540,-100" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-115" width="469.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="774.52" y="-95" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.让AI扮演一个求职者，把你面试过程中遇到的问题分享给他，听听他的回答</text><path d="M310.52,-100 C335.26,-100 335.26,-60 360,-60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="360" y="-75" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提示词</text><path d="M440,-60 C490,-60 490,-60 540,-60" fill="none" stroke="#6F81DB" stroke-width="2"/><rect x="540" y="-75" width="2797.0800000000013" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="1938.5400000000006" y="-55" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">【角色】你是一个优秀的产品经理求职者，具有丰富的求职面试经历【背景】现在我需要对你进行面试，你要从一个产品求职者的角度回答我的一些问题【任务】请你模拟一位面试者，然后我会向你提出若干个产品经理岗位的面试题，你需要一一作答。你要尽可能理解我的问题，然后给出令人满意的回答。【要求】1.只有当我提出了问题之后，你才可以作答；2.每次的回答不能太短，需要接近真实的环境，要给出严肃、合适的回答；3.每次回答之后，请以“我已经回答完毕”结尾；</text><path d="M76,0 C166,0 166,20 256,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="180" y="5" width="105.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="232.52" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">AI扮演资深HR</text><path d="M285.04,20 C322.52,20 322.52,0 360,0" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="-15" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,0 C490,0 490,-20 540,-20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="-35" width="509.08" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="794.54" y="-15" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.让AI扮演资深HR，逐条向你提问，你可以了解HR面试的时候可能对方会问你什么？</text><path d="M440,0 C490,0 490,20 540,20" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="5" width="482.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="781.02" y="25" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.让AI扮演面试官，同时做到自问自答，知道他会问什么的同时也看看他的回答</text><path d="M285.04,20 C322.52,20 322.52,60 360,60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="360" y="45" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="405.5" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">参考提示词</text><path d="M451,60 C495.5,60 495.5,60 540,60" fill="none" stroke="#6EC4C4" stroke-width="2"/><rect x="540" y="45" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">省略</text><path d="M76,0 C166,0 166,120 256,120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="105" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="258" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对面试回答评价和点评</text><path d="M336,120 C348,120 348,100 360,100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="85" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,100 C490,100 490,100 540,100" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="85" width="404.03999999999996" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="742.02" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.直接让AI来点评你的面试回答，前提是你要给它投喂问题和回答</text><path d="M336,120 C348,120 348,140 360,140" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="125" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="400" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提示词</text><path d="M440,140 C490,140 490,140 540,140" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="125" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="145" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">省略</text><path d="M76,0 C166,0 166,220 256,220" fill="none" stroke="#77C386" stroke-width="2"/><rect x="180" y="205" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="258" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">对面试问题拆解和分析</text><path d="M336,220 C348,220 348,200 360,200" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="185" width="80" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="400" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提问方式</text><path d="M440,200 C490,200 490,180 540,180" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="165" width="651.04" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="865.52" y="185" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.直接让AI扮演资深的产品经历面试官，然后你把你遇到的问题丢给它，让它拆解这个问题背后考察的是什么</text><path d="M440,200 C490,200 490,220 540,220" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="205" width="638.56" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="859.28" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.直接让AI整理出最常见的10个产品问题，然后分别拆解一下为什么面试官要问这个，问这个的原因是什么</text><path d="M336,220 C348,220 348,260 360,260" fill="none" stroke="#77C386" stroke-width="2"/><rect x="360" y="245" width="80" height="30" rx="6" fill="#EFF0F0" stroke="none"/><text x="400" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提示词</text><path d="M440,260 C490,260 490,260 540,260" fill="none" stroke="#77C386" stroke-width="2"/><rect x="540" y="245" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="265" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">省略</text>
</svg>