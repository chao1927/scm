<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="-136 -899 1631 1798" width="1631" height="1798"
  style="background:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<defs></defs>
<rect x="-136" y="-899" width="1631" height="1798" fill="#fff"/>
<rect x="-52" y="-18" width="104" height="36" rx="8" fill="#EFF0F0" stroke="none"/><text x="0" y="6" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">经验分享</text><path d="M52,0 C142,0 142,-400 232,-400" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="180" y="-415" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="238.5" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">一些观察和发现</text><path d="M297,-400 C328.5,-400 328.5,-740 360,-740" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-755" width="325.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="522.76" y="-735" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.简历是第一道关卡，简历评判也是一个玄学的事情</text><path d="M685.52,-740 C612.76,-740 612.76,-800 540,-800" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-815" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="605" y="-795" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">写大众认可的简历</text><path d="M685.52,-740 C612.76,-740 612.76,-760 540,-760" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-775" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="-755" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">突出亮点和优势，留下记忆点</text><path d="M685.52,-740 C612.76,-740 612.76,-720 540,-720" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-735" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="644" y="-715" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历要反复修改，突破固有认知</text><path d="M685.52,-740 C612.76,-740 612.76,-680 540,-680" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-695" width="188.11" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="634.0550000000001" y="-675" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历上的自己是Pro Max版本</text><path d="M297,-400 C328.5,-400 328.5,-580 360,-580" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-595" width="364.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="542.26" y="-575" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.面试过程中，沟通表达能力占比非常高，其次是逻辑思维</text><path d="M724.52,-580 C632.26,-580 632.26,-640 540,-640" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-655" width="156" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="618" y="-635" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">结构化的表达非常重要</text><path d="M724.52,-580 C632.26,-580 632.26,-600 540,-600" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-615" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="-595" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">要有条理性，要体现出逻辑性</text><path d="M724.52,-580 C632.26,-580 632.26,-560 540,-560" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-575" width="234" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="657" y="-555" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">要展现出头脑灵活的感觉，自信坦然</text><path d="M724.52,-580 C632.26,-580 632.26,-520 540,-520" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-535" width="195" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="637.5" y="-515" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">看一下《结构思考力》这本书</text><path d="M297,-400 C328.5,-400 328.5,-420 360,-420" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-435" width="377.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="548.76" y="-415" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.有丰富工作经验的产品经理不一定会面试，工龄不等于阅历</text><path d="M737.52,-420 C638.76,-420 638.76,-480 540,-480" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-495" width="143" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="611.5" y="-475" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不要在舒适区待太久</text><path d="M737.52,-420 C638.76,-420 638.76,-440 540,-440" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-455" width="338.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="709.26" y="-435" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">提升自己的能力圈范围，优秀的产品一定的T型或者π型</text><path d="M737.52,-420 C638.76,-420 638.76,-400 540,-400" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-415" width="871" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="975.5" y="-395" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">很多工作丰富的老产品，在面试过程中总是让人感觉欠缺点火候，不够令人心动，很核心的点就是让人感觉能力没有特别突出，没有自己沉淀的东西</text><path d="M737.52,-420 C638.76,-420 638.76,-360 540,-360" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-375" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="-355" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">高级岗位比初级岗位更难面试</text><path d="M297,-400 C328.5,-400 328.5,-280 360,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-295" width="455.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="587.76" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.初面的面试官比你年轻，比你经验少挺多，那么面试通过率可能不会太高</text><path d="M815.52,-280 C677.76,-280 677.76,-320 540,-320" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-335" width="404.55999999999995" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="742.28" y="-315" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">固有认知是一个不可忽视的问题，怎么让Leader具有权威性很重要</text><path d="M815.52,-280 C677.76,-280 677.76,-280 540,-280" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-295" width="339.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="709.78" y="-275" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">小公司的Leader一般都要比后续人更有经验，更有阅历</text><path d="M815.52,-280 C677.76,-280 677.76,-240 540,-240" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-255" width="299" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="689.5" y="-235" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">候选人可以接纳降级，但是面试官不一定能接纳</text><path d="M297,-400 C328.5,-400 328.5,-160 360,-160" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-175" width="377.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="548.76" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">5.不要担心面试后被要求做题，或者提交过往的项目、作品等</text><path d="M737.52,-160 C638.76,-160 638.76,-200 540,-200" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-215" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="696" y="-195" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果有提前准备作品，完全可以大大方方的先展示</text><path d="M737.52,-160 C638.76,-160 638.76,-160 540,-160" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-175" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="715.5" y="-155" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果是发之前的项目和作品，则可以脱敏后提交，要自信</text><path d="M737.52,-160 C638.76,-160 638.76,-120 540,-120" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-135" width="351" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="715.5" y="-115" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">大多数公司不会那么闲的去套方案，尤其是一个产品方案</text><path d="M297,-400 C328.5,-400 328.5,-40 360,-40" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="360" y="-55" width="286.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="503.26" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">6.自带作品去面试对于大多数人来说都有帮助</text><path d="M646.52,-40 C593.26,-40 593.26,-80 540,-80" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-95" width="403" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="741.5" y="-75" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">很多人会认为只有校招生才要看作品，但是实际上现在并不是这样</text><path d="M646.52,-40 C593.26,-40 593.26,-40 540,-40" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-55" width="611" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="845.5" y="-35" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果你没有优秀的，知名的产品做背书，那么作品就是你直接的背书，放上作品链接，一定是能加分的</text><path d="M646.52,-40 C593.26,-40 593.26,0 540,0" fill="none" stroke="#A287E1" stroke-width="2"/><rect x="540" y="-15" width="578.76" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="829.38" y="5" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">作品可以包含：需求文档，竞品分析文档，行业/市场调研文档，原型图，业务流程图，设计稿等</text><path d="M52,0 C142,0 142,420 232,420" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="180" y="405" width="130" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="245" y="425" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">我的一些面试经验</text><path d="M310,420 C335,420 335,60 360,60" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="45" width="338.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="529.26" y="65" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">1.先投递一些太远的，不太想去的公司，当作练手使用</text><path d="M698.52,60 C619.26,60 619.26,40 540,40" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="25" width="208" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="644" y="45" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">面试的感觉很重要，要提前练习</text><path d="M698.52,60 C619.26,60 619.26,80 540,80" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="65" width="221" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="650.5" y="85" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不要上来就投递自己想要去的公司</text><path d="M310,420 C335,420 335,220 360,220" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="205" width="391.55999999999995" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="555.78" y="225" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">2.面试前做好足够的准备，能“组件化”的东西可以提前“组件化”</text><path d="M751.56,220 C645.78,220 645.78,120 540,120" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="105" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="125" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历模板</text><path d="M751.56,220 C645.78,220 645.78,160 540,160" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="145" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="165" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">自我介绍</text><path d="M751.56,220 C645.78,220 645.78,200 540,200" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="185" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="205" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">离职原因</text><path d="M751.56,220 C645.78,220 645.78,240 540,240" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="225" width="80" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="580" y="245" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">职业规划</text><path d="M751.56,220 C645.78,220 645.78,280 540,280" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="265" width="91" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="585.5" y="285" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">反问的问题</text><path d="M751.56,220 C645.78,220 645.78,320 540,320" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="305" width="104" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="592" y="325" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">常见面试题等</text><path d="M310,420 C335,420 335,460 360,460" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="445" width="313.56" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="516.78" y="465" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">3.Boss直聘投递简历的时候，不要被关键词限制住</text><path d="M673.56,460 C606.78,460 606.78,360 540,360" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="345" width="117" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="598.5" y="365" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">供应链产品经理</text><path d="M673.56,460 C606.78,460 606.78,400 540,400" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="385" width="98.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="589.14" y="405" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">ERP产品经理</text><path d="M673.56,460 C606.78,460 606.78,440 540,440" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="425" width="98.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="589.14" y="445" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">WMS产品经理</text><path d="M673.56,460 C606.78,460 606.78,480 540,480" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="465" width="98.28" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="589.14" y="485" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">OMS产品经理</text><path d="M673.56,460 C606.78,460 606.78,520 540,520" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="505" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="525" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">订单产品经理，库存产品经理</text><path d="M673.56,460 C606.78,460 606.78,560 540,560" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="545" width="130" height="30" rx="6" fill="transparent" stroke="#BFBFBF"/><text x="605" y="565" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">要发散，不要局限</text><path d="M310,420 C335,420 335,620 360,620" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="605" width="416.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="568.26" y="625" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4.离职后一定要花时间总结过往的项目，把精华和亮点东西复盘一遍</text><path d="M776.52,620 C658.26,620 658.26,600 540,600" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="585" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="605" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">简历上写的项目一定要很熟悉</text><path d="M776.52,620 C658.26,620 658.26,640 540,640" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="625" width="247" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="663.5" y="645" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">过往工作中表现亮眼的地方要总结提炼</text><path d="M310,420 C335,420 335,680 360,680" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="665" width="455.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="587.76" y="685" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">5.有条件去现场面试的可以去现场，在线面试对很多人来说发挥都会打折扣</text><path d="M310,420 C335,420 335,760 360,760" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="360" y="745" width="390.52" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="555.26" y="765" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">6.简历上要有求职意向，面试过程中也要表达出自己的求职意向</text><path d="M750.52,760 C645.26,760 645.26,720 540,720" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="705" width="195" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="637.5" y="725" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">转行换赛道的朋友尤其要注意</text><path d="M750.52,760 C645.26,760 645.26,760 540,760" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="745" width="312" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="696" y="765" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">如果是稍微偏差一些行业方向的，也可以特别注明</text><path d="M750.52,760 C645.26,760 645.26,800 540,800" fill="none" stroke="#DFB85D" stroke-width="2"/><rect x="540" y="785" width="468" height="30" rx="6" fill="#fafafa" stroke="none"/><text x="774" y="805" text-anchor="middle" font-size="13" fill="#333" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不要让对方感觉你是海投，随意投递的，要表现出你的目的性，你是有备而来</text>
</svg>